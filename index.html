<!DOCTYPE html>
<html lang="sv">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Munksjön — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#06121a;--panel:#12303a;--panel-2:#19404c;--line:#2a4f5c;--ink:#eef5f6;--muted:#92aab2;
    --copper:#d6a15c;--copper-bright:#ecbd7a;--cyan:#5fc0d4;--gold:#f2cd62;--danger:#df6f5d;--reed:#8aa57f;
    --mort:#9aa873;--abborre:#4ea3b0;--braxen:#c0a36a;--gadda:#6f9e6a;--gos:#8a93c0;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  .app{position:relative;width:100%;max-width:480px;height:100vh;height:100dvh;margin:0 auto;display:flex;flex-direction:column}
  .topbar{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 14px 8px;z-index:8;background:linear-gradient(180deg,rgba(6,18,26,.96),rgba(6,18,26,.6))}
  .lvl{display:flex;align-items:center;gap:8px}
  .lvlb{font-family:'Fraunces';font-weight:800;font-size:17px;background:var(--copper);color:#26190a;width:32px;height:32px;border-radius:9px;display:grid;place-items:center;line-height:1}
  .xpbar{height:6px;background:#0b1f27;border:1px solid var(--line);border-radius:20px;overflow:hidden;min-width:60px}
  .xpf{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--copper));transition:width .5s}
  .xpt{font-family:'IBM Plex Mono';font-size:9px;color:var(--muted);margin-top:3px}
  .cur{text-align:right;font-family:'IBM Plex Mono';font-weight:600;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  /* FG-räknare: tydlig kopparpill med myntmarkör, alltid synlig i toppfältet. */
  .cur .money{display:inline-flex;align-items:center;gap:6px;background:rgba(184,115,51,.18);border:1px solid var(--copper);border-radius:20px;padding:3px 11px}
  .cur .coin{color:var(--copper-bright);font-size:11px;line-height:1}
  .cur .kr{font-size:15px;color:var(--copper-bright)} .cur .pe{font-size:11px;color:var(--gold)}
  .tabbar{display:flex;gap:6px;padding:0 14px 8px;z-index:8}
  .tab{flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:10px;padding:9px;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
  .tab[aria-selected="true"]{background:var(--panel);color:var(--ink);border-color:var(--cyan)}
  .screens{position:relative;flex:1;min-height:0}
  .screen{position:absolute;inset:0;display:none}.screen.on{display:block}.screen.scroll{overflow-y:auto;padding:4px 14px 24px}

  #cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .dock{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:10px 12px 12px;background:linear-gradient(0deg,rgba(6,16,22,.95),rgba(6,16,22,.4) 80%,transparent);pointer-events:none}
  .dock>*{pointer-events:auto}
  .oddsbar{height:18px;border-radius:7px;overflow:hidden;display:flex;background:#0a1c23;border:1px solid var(--line);margin-bottom:5px}
  .oseg{height:100%;transition:width .4s}
  .oddstop{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:7px}
  .oddstop .nappv{font-family:'IBM Plex Mono';font-weight:600;color:var(--cyan)} .oddstop .leg{color:var(--muted);font-size:10px}
  .setupbtns{display:flex;gap:8px}
  .upl{flex:1;border:1px solid var(--line);background:rgba(18,48,58,.85);color:var(--ink);border-radius:12px;padding:12px;font-weight:600;font-size:14px;cursor:pointer}
  .cast{flex:1.4;border:none;border-radius:12px;padding:13px;font-family:'Fraunces';font-weight:800;font-size:18px;background:linear-gradient(180deg,var(--copper-bright),var(--copper));color:#26190a;cursor:pointer;box-shadow:0 8px 20px -8px rgba(214,161,92,.6)}
  .cast:active{transform:translateY(1px)} .cast.hidden,.upl.hidden{display:none}
  .panel{position:absolute;left:0;right:0;bottom:0;z-index:9;transform:translateY(110%);transition:transform .3s;background:linear-gradient(0deg,var(--panel),var(--panel-2));border-top:1px solid var(--cyan);border-radius:18px 18px 0 0;padding:16px 16px 14px}
  .panel.on{transform:translateY(0)}
  .panel h4{margin:0 0 7px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px}
  .chip{background:#0d2129;border:1px solid var(--line);color:var(--ink);border-radius:30px;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:.12s}
  .chip[aria-pressed="true"]{background:var(--cyan);color:#04222a;border-color:var(--cyan);font-weight:600}
  .chip.locked{opacity:.4;cursor:not-allowed}
  .panel .done{width:100%;border:none;border-radius:12px;padding:13px;background:var(--copper);color:#26190a;font-weight:700;font-size:15px;cursor:pointer;margin-top:2px}

  .hud{position:absolute;top:10px;left:12px;right:12px;z-index:6;display:none;flex-direction:column;gap:8px}
  .hud.on{display:flex}
  .g .gl{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;text-shadow:0 1px 2px #000}
  .track{height:10px;border-radius:20px;background:rgba(6,16,22,.75);border:1px solid var(--line);overflow:hidden;position:relative}
  .tfl{position:absolute;left:0;top:0;bottom:0;width:0;transition:width .06s linear}
  .tens .tfl{background:linear-gradient(90deg,var(--reed),var(--gold) 70%,var(--danger))}
  .tens .red{position:absolute;right:0;top:0;bottom:0;width:16%;background:repeating-linear-gradient(45deg,rgba(223,111,93,.45) 0 5px,transparent 5px 10px)}
  .dist .tfl{background:linear-gradient(90deg,#7a93a8,#a9c2cf)}
  .runwarn{align-self:center;background:rgba(223,111,93,.92);color:#2a0e0a;font-weight:800;font-size:12px;letter-spacing:.05em;padding:5px 14px;border-radius:30px;opacity:0;transition:.15s;text-transform:uppercase}
  .runwarn.on{opacity:1}

  .reelpad{position:absolute;right:14px;bottom:120px;width:64px;height:210px;z-index:7;display:none;background:rgba(13,33,41,.85);border:1px solid var(--line);border-radius:32px;touch-action:none;box-shadow:0 8px 18px rgba(0,0,0,.4)}
  .reelpad.on{display:block}
  .reelpad .arrows{position:absolute;left:0;right:0;top:9px;text-align:center;color:var(--cyan);font-size:13px;opacity:.7;pointer-events:none}
  .reelpad .arrows.b{top:auto;bottom:9px}
  .reelpad .lbl{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);pointer-events:none}
  .reelpad .grip{position:absolute;left:8px;right:8px;height:44px;top:83px;border-radius:24px;background:linear-gradient(180deg,var(--copper-bright),var(--copper));box-shadow:0 3px 8px rgba(0,0,0,.4);pointer-events:none}
  .leftacts{position:absolute;left:14px;bottom:120px;z-index:7;display:flex;flex-direction:column;gap:10px}
  .la{border:none;border-radius:16px;padding:15px 20px;font-family:'Fraunces';font-weight:800;font-size:16px;cursor:pointer;display:none;min-width:112px}
  .la.on{display:block} .la:active{transform:translateY(1px)}
  .la.lift{background:linear-gradient(180deg,#bcd0e8,#7f93b6);color:#10202e}
  .la.strike{background:linear-gradient(180deg,#8be8c6,var(--cyan));color:#04222a;animation:pulse .55s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,192,212,.5)}100%{box-shadow:0 0 0 22px rgba(95,192,212,0)}}

  .shopwrap{padding-top:4px}
  .stabs{display:flex;gap:7px;margin-bottom:10px}
  .stab{flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:10px;padding:9px;font-weight:600;font-size:13px;cursor:pointer}
  .stab[aria-selected="true"]{background:var(--panel);color:var(--ink);border-color:var(--cyan)}
  .hero{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);height:230px;background:radial-gradient(120% 100% at 50% 18%,#1c4150,#0c1f27)}
  #shop3d{width:100%;height:100%;display:block;position:relative;z-index:1;touch-action:none}
  .hero .wbg{position:absolute;inset:0;z-index:0;opacity:0;transition:opacity .4s;background:linear-gradient(180deg,#c2a079 0%,#6a6f8e 42%,#34556b 42.1%,#0f2030 100%)}
  .hero.water .wbg{opacity:1} .hero.water{background:#0f2030}
  .vtog{position:absolute;top:10px;right:10px;z-index:3;display:flex;border:1px solid var(--line);border-radius:30px;overflow:hidden;background:rgba(8,20,26,.6)}
  .vtog button{border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:700;padding:6px 11px;cursor:pointer}
  .vtog button[aria-pressed="true"]{background:var(--cyan);color:#04222a}
  .heq{position:absolute;top:10px;left:10px;z-index:2;display:none;background:rgba(138,165,127,.18);border:1px solid var(--reed);color:var(--reed);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 9px;border-radius:30px}
  .heq.on{display:block}
  .sinfo{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:11px}
  .sinfo .nm{font-family:'Fraunces';font-weight:800;font-size:19px} .sinfo .ds{color:var(--muted);font-size:12px;margin:3px 0 11px}
  .statline{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .statline .lab{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);width:90px;flex:none}
  .sbar{flex:1;height:8px;background:#0b1f27;border:1px solid var(--line);border-radius:20px;overflow:hidden;position:relative}
  .sbar .f{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--cyan),var(--copper-bright));transition:width .4s}
  .sbar .cap{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--danger)}
  .sv{font-family:'IBM Plex Mono';font-size:12px;color:var(--copper-bright);width:42px;text-align:right;flex:none}
  .cnote{font-size:11px;color:var(--muted);background:#0b1f27;border:1px solid var(--line);border-radius:10px;padding:9px;line-height:1.5}.cnote b{color:var(--gold)}
  .ptag{font-size:11px;color:var(--muted);margin-top:9px}.ptag b{color:var(--cyan)}
  .scta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .qstep{display:flex;align-items:center;gap:14px;margin-top:12px}
  .qbtn{width:42px;height:42px;border:1px solid var(--line);border-radius:11px;background:var(--panel);color:var(--ink);font-size:22px;font-weight:700;line-height:1;cursor:pointer}
  .qbtn:disabled{opacity:.35;cursor:default}
  .qn{font-family:'IBM Plex Mono';font-weight:600;font-size:20px;min-width:48px;text-align:center}
  .sprice{font-family:'IBM Plex Mono';font-weight:600;font-size:17px}.sprice.kr{color:var(--copper-bright)}.sprice.pe{color:var(--gold)}.sprice.free{color:var(--reed)}
  .sbuy{margin-left:auto;border:none;border-radius:11px;padding:12px 20px;font-weight:700;font-size:14px;cursor:pointer}
  .sbuy.primary{background:linear-gradient(180deg,var(--copper-bright),var(--copper));color:#26190a}.sbuy.equip{background:var(--cyan);color:#04222a}
  .sbuy.equipped{background:transparent;border:1px solid var(--reed);color:var(--reed);cursor:default}.sbuy.cant{background:#1c3e4a;color:var(--muted);cursor:default}
  .shelf{display:flex;gap:9px;overflow-x:auto;padding:12px 0 4px;scrollbar-width:none}.shelf::-webkit-scrollbar{display:none}
  .sitem{flex:none;width:92px;cursor:pointer;border:1px solid var(--line);border-radius:13px;background:var(--panel);padding:8px;position:relative}
  .sitem[aria-selected="true"]{border-color:var(--cyan);background:var(--panel-2)}
  .sthumb{height:58px;border-radius:9px;margin-bottom:7px;background:radial-gradient(120% 100% at 50% 20%,#1c4150,#0c1f27);background-size:contain,cover;background-position:center;background-repeat:no-repeat}
  .sitem .nm2{font-size:11px;font-weight:600;line-height:1.2}.sitem .pr2{font-family:'IBM Plex Mono';font-size:10px;color:var(--muted);margin-top:3px}
  .sitem .ow{position:absolute;top:5px;right:5px;width:15px;height:15px;border-radius:50%;background:var(--reed);color:#0b1f27;font-size:10px;font-weight:800;display:none;place-items:center}
  .sitem.owned .ow{display:grid}

  .lcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px}.lcard.locked{opacity:.45}
  .ltop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .ltop .ln{font-family:'Fraunces';font-weight:600;font-size:17px}.ltop .lc{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted)}
  .lcl{display:flex;gap:5px;margin-bottom:8px}
  .clc{flex:1;text-align:center;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:5px;border-radius:7px;border:1px solid var(--line);color:var(--muted)}
  .clc.got{background:#0d2129;color:var(--ink);border-color:var(--reed)}
  .lrec{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;font-family:'IBM Plex Mono';font-size:11px}
  .lrec .l2{color:var(--muted);font-size:8px;letter-spacing:.05em;text-transform:uppercase}.lrec .v2{font-size:13px;font-weight:600;margin-top:2px}
  .lrec .pb .v2{color:var(--copper-bright)}.lrec .spel .v2{color:var(--cyan)}.lrec .verk .v2{color:var(--gold)}

  /* Fiskeväska (inventory) — tryckbara föremål + detaljvy */
  .invwrap{padding:4px 0 18px}
  .invtitle{font-family:'Fraunces';font-weight:700;font-size:20px;margin:6px 2px 12px}
  .invh{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:16px 2px 7px}
  .invitems{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .invitem{display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s}
  .invitem.active{border-color:var(--reed)}
  .invitem.sel{border-color:var(--cyan);background:#0d2630}
  .invitem .iiname{font-size:14px;font-weight:600}
  .invitem .iimeta{font-family:'IBM Plex Mono';font-size:11px;color:var(--copper-bright)}
  .invitem.active .iimeta{color:var(--reed)}
  .invdetail{margin-top:16px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:16px}
  .invdetail:empty{display:none}
  .invdetail .idname{font-family:'Fraunces';font-weight:700;font-size:19px}
  .invdetail .ds{color:var(--muted);font-size:12px;margin:3px 0 2px;line-height:1.5}
  .idstats{margin:11px 0 13px;display:flex;flex-direction:column;gap:6px}
  .idrow{display:flex;justify-content:space-between;font-size:13px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .idrow:last-child{border-bottom:none;padding-bottom:0}
  .idrow span:first-child{color:var(--muted)}
  .idrow span:last-child{font-family:'IBM Plex Mono';font-weight:600}
  .idequip{width:100%;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;background:linear-gradient(180deg,var(--copper-bright),var(--copper));color:#26190a}
  .idequip.done2{background:transparent;border:1px solid var(--reed);color:var(--reed);cursor:default}
  .idequip.cant2{background:#1c3e4a;color:var(--muted);cursor:default}

  /* "Slut på bete"-ruta */
  .card .lvlh{font-family:'Fraunces';font-weight:800;font-size:22px;margin:4px 0 2px;color:var(--copper-bright)}
  .obalts{display:flex;flex-direction:column;gap:7px;margin:10px 0 12px}
  .obalt{border:1px solid var(--reed);border-radius:10px;padding:10px;background:var(--panel);color:var(--ink);font-size:13px;cursor:pointer}

  .modal{position:absolute;inset:0;z-index:20;display:none;place-items:center;padding:22px;background:rgba(4,12,16,.78)}
  .modal.on{display:grid}
  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:22px;width:100%;max-width:340px;text-align:center;box-shadow:0 30px 60px -20px #000}
  .card h2{font-family:'Fraunces';font-weight:800;margin:2px 0;font-size:24px}.card .sub{color:var(--muted);font-size:12px;margin:0}
  .wt{font-family:'IBM Plex Mono';font-weight:600;font-size:30px;color:var(--copper-bright);margin:7px 0 2px}
  .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:6px}
  .rw{background:#0d2129;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:12px 0;font-size:12px;text-align:left}
  .rw .rl{display:flex;justify-content:space-between;padding:2px 0}.rw .rl .b{color:var(--gold);font-weight:600}
  .mbtns{display:flex;gap:9px}
  .mb{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:11px;padding:12px;font-weight:600;font-size:14px;cursor:pointer}.mb.primary{background:var(--copper);color:#26190a;border-color:var(--copper)}
  /* Level-up-ruta: återanvänder modal/card-stilen, kopparfärgad rubrik. */
  #lvlup .card h2{color:var(--copper-bright)} #lvlup #luBody{text-align:center}#lvlup #luBody .rl{justify-content:center}#lvlup #luBody .head{color:var(--muted);font-size:11px;margin-bottom:3px}
  .toast{position:absolute;top:96px;left:50%;transform:translateX(-50%) translateY(-12px);opacity:0;z-index:30;background:rgba(18,48,58,.96);border:1px solid var(--cyan);border-radius:30px;padding:9px 16px;font-size:13px;font-weight:600;transition:.3s;pointer-events:none;white-space:nowrap;max-width:92%;text-align:center;text-shadow:0 1px 2px #000}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .fhint{position:absolute;left:0;right:0;bottom:128px;z-index:6;text-align:center;font-size:12px;color:var(--ink);text-shadow:0 1px 4px #000;pointer-events:none}
  @media (prefers-reduced-motion:reduce){.la.strike{animation:none}}
  /* === DEBUG-PANEL START (ta bort hela detta block före release) === */
  #dbgpanel{position:fixed;top:8px;right:8px;z-index:9999;font-family:inherit}
  #dbgToggle{background:#b3261e;color:#fff;border:0;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.45)}
  #dbgBody{display:none;flex-direction:column;gap:4px;margin-top:4px;background:rgba(10,16,20,.94);border:1px solid #b3261e;border-radius:8px;padding:6px;min-width:128px}
  #dbgpanel.open #dbgBody{display:flex}
  #dbgBody button{background:#1c2a32;color:#e6f0f0;border:1px solid #2f4651;border-radius:6px;padding:6px 8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-align:left}
  #dbgBody button:hover{background:#274050}
  /* === DEBUG-PANEL SLUT === */
</style>

<div class="app" id="app">
  <div class="topbar">
    <div class="lvl"><div class="lvlb" id="lvlb">1</div></div>
    <div><div class="xpbar"><div class="xpf" id="xpf"></div></div><div class="xpt" id="xpt">0 / 100 XP</div></div>
    <div class="cur"><div class="money" title="Fiskeguld"><span class="coin">●</span><span class="kr" id="kr">0 FG</span></div><div class="pe" id="pe">◈ 0</div></div>
  </div>
  <div class="tabbar" role="tablist">
    <button class="tab" role="tab" aria-selected="true" data-s="fiska">Fiska</button>
    <button class="tab" role="tab" aria-selected="false" data-s="shop">Shop</button>
    <button class="tab" role="tab" aria-selected="false" data-s="vaska">Väska</button>
    <button class="tab" role="tab" aria-selected="false" data-s="logg">Logg</button>
  </div>
  <div class="screens">
    <section class="screen on" id="s-fiska">
      <canvas id="cv"></canvas>
      <div class="hud" id="hud">
        <div class="g tens"><div class="gl"><span>Linspänning</span><span id="tp"></span></div><div class="track"><div class="red"></div><div class="tfl" id="tf"></div></div></div>

<script>
window.addEventListener('load', () => {
/* Hjälpfunktion — hämtar DOM-element via id (motsvarar HTML-strukturen). */

/* =============================================================================
   KONFIGURATION

   ============================================================================= */

const HAPTICS_SUPPORTED = ('vibrate' in navigator) && typeof navigator.vibrate === 'function'
  && !/iPad|iPhone|iPod/.test(navigator.userAgent);

const BITE_CEILING = 0.48;        /* TAK — max nappsannolikhet per kast */

/* STORLEKSGOLV per level: med stigande level tonas artens 'liten'-klass ut och

   (level höjer golvet → mindre småfisk; upplägget når taket → troféer).

/* ############################################################################

   ############################################################################ */

/* SPÖN — level då spöt SYNS och går att köpa i shoppen.
   bettre_met = 3 så att Bättre metspö blir ett tidigt, nåbart uppgraderingsmål. */

/* SPÖN — pris i kronor (startspöt ingår gratis i startkitet). */

/* SPÖN — egen maxkastlängd, normaliserad 0..1 (startspöt kortast, båt-spöna längst). */

/* SPÖN — liten, FAST storleksbonus per spö: skjuter storleksdragningen en aning mot
   'bra'/'stor' (samma riktning som uppläggskvaliteten, fast liten och oberoende av level).
   0 = ingen bonus. Håll värdena små så bonusen känns men aldrig dominerar. */
const ROD_SIZE_BONUS    = { start: 0, bettre_met: 0.08, spinn: 0, vertikal: 0, trolling: 0 };

/* BETE — mjukt tak för hur mycket bete får påverka artfördelningen (aldrig avgörande). */
const BAIT_BIAS_CAP = 0.10;        /* ±10 % max förskjutning av artvikt */

/* FISKEVÄSKA / FÖRBRUKNINGSBART BETE (steg 1) — platshållare.

const BAIT_CONSUME_PER_CATCH = 1;             /* antal bete som dras per LANDAD mete-fångst */
/* BETE — köp i antal (steg 2): pris per styck och köpsteg för förbrukningsbart mete-bete. */
const BAIT_UNIT_PRICE = 1;   /* FG per styck för förbrukningsbart mete-bete (10 st = 10 FG) */
const BAIT_BUY_STEP   = 10;  /* köpsteg i mängdväljaren (10 → 20 → 30 ...) */

const LOW_BAIT_WARNING_THRESHOLD = 5;  /* visa "snart slut"-varning vid detta antal kvar */

const BAIT_PRICES = { mask: 0, maggot: 40, majs: 60, jigg: 0, spinnare: 120, wobbler: 200, vertikaljigg: 0, pirk: 160, trollingwobbler: 0 };
/* BETE — artbias per bete. Alla värden hålls inom [0.90, 1.10] så inget kapas av
   taket; varje bete ger en tydlig men liten styrning mot sin målart. */
const BAIT_SPECIES_BIAS = {
  mask:            { mort: 1.10, abborre: 1.05, braxen: 1.10, gadda: 0.92, gos: 0.92 },
  maggot:          { mort: 1.10, abborre: 1.08, braxen: 1.05, gadda: 0.92, gos: 0.92 },
  majs:            { mort: 1.05, abborre: 0.95, braxen: 1.10, gadda: 0.92, gos: 0.92 },
  jigg:            { mort: 0.92, abborre: 1.10, braxen: 0.92, gadda: 1.05, gos: 1.06 },
  spinnare:        { mort: 0.92, abborre: 1.10, braxen: 0.92, gadda: 1.08, gos: 1.02 },
  wobbler:         { mort: 0.90, abborre: 1.02, braxen: 0.90, gadda: 1.10, gos: 1.08 },
  vertikaljigg:    { mort: 0.92, abborre: 1.06, braxen: 0.92, gadda: 1.04, gos: 1.10 },
  pirk:            { mort: 0.92, abborre: 1.04, braxen: 0.92, gadda: 1.06, gos: 1.10 },
  trollingwobbler: { mort: 0.90, abborre: 1.00, braxen: 0.90, gadda: 1.10, gos: 1.10 },
};

/* BÅT — level då båten SYNS/går att köpa i shoppen, samt pris i kronor.
   När båten ägs blir vertikal- och trollingspöna (som kräver båt) användbara. */
const BOAT_UNLOCK_LEVEL = 15;
const BOAT_PRICE = 2500;

const LEVEL_SKILL_SPAN = 19;      /* Antal level till full skicklighet (lf) */

/* ############################################################################
   PLATSHÅLLARE — XP (kalibreras via speltest)
   ############################################################################ */

/* XP-kurva: kravet växer exponentiellt så det blir brantare uppåt.
   krav(level) = XP_LEVEL_BASE × XP_LEVEL_GROWTH^(level−1). */
const XP_LEVEL_BASE   = 100;      /* XP för level 1→2 */
const XP_LEVEL_GROWTH = 1.4;      /* tillväxtfaktor per level (högre = brantare) */

/* XP per fångad fisk: grund-XP per art × art-relativ storlek (samma relativa
   logik som fighten — stor fisk för arten ger mer XP). */
const XP_FISH_BASE = { mort: 5, abborre: 9, braxen: 8, gadda: 22, gos: 30 };  /* liten fisk för arten */
const XP_FISH_BASE_DEFAULT = 6;   /* fallback om art saknas i tabellen */
const XP_FISH_SIZE_BONUS = 3.0;   /* trofé ger base × (1 + detta); liten ger ≈ base */

/* Catch & release: släpp ger ALLTID mer XP än att behålla och sälja. */
const XP_RELEASE_FACTOR = 1.5;    /* släpp-XP = behåll-XP × denna faktor (>1) */

/* ############################################################################
   PLATSHÅLLARE — EKONOMI (FG/Fiskeguld, kalibreras via speltest)
   ############################################################################ */

/* Fiskpris i FG = grundpris per art × art-relativ storlek (samma relativa logik
   som XP — stor fisk för arten ger betydligt mer). Riktmärke: en genomsnittlig
   nybörjarfisk ≈ 5 FG, så att Bättre metspö + maggot + majs (150+40+60 = 250 FG)
   tjänas ihop på ca 10 min aktivt fiske om all fisk säljs. Synkar ungefär med
   att level 5 nås, då Bättre metspö låses upp. */
const FG_FISH_BASE = { mort: 4, abborre: 6, braxen: 5, gadda: 14, gos: 18 };  /* liten fisk för arten */
const FG_FISH_BASE_DEFAULT = 5;   /* fallback om art saknas i tabellen */
const FG_FISH_SIZE_BONUS = 3.0;   /* trofé ger base × (1 + detta); liten ger ≈ base */

/** Beräknar XP som krävs för att nå nästa level. Mål: lvl 1→5 ~25 min aktivt fiske. */
function xpRequiredForLevel(level) {
  return Math.round(XP_LEVEL_BASE * Math.pow(XP_LEVEL_GROWTH, level - 1));
}

/** Total ackumulerad XP som krävts för att NÅ en viss level (summa av alla tidigare trösklar).
    Endast för visning — påverkar inte level-beräkningen. */
function cumulativeXpForLevel(level) {
  let sum = 0;
  for (let i = 1; i < level; i++) sum += xpRequiredForLevel(i);
  return sum;
}

/* ############################################################################
   PLATSHÅLLARE — FIGHT (kalibreras senare)
   Allt deterministiskt: svårigheten beror på hur stor fisken är i förhållande
   till SIN EGEN ARTS spann (liten → trofé). Spelarens level spelar ingen roll.
   Ingen slump avgör om man tappar fisken.
   ############################################################################ */

/* Svårighet: difficulty = MIN + (MAX − MIN) × relativStorlek^EXPONENT.
   relativStorlek = var fiskens vikt ligger i artens spann (artens minsta → rekord). */
const FIGHT_DIFFICULTY_MIN = 0.12;      /* GOLV — liten fisk för sin art förblir trivial (rör ej) */
const FIGHT_DIFFICULTY_MAX = 2.4;       /* TAK — trofé för sin art når en rejäl fight (höjt en gnutta 2.2→2.4) */
const FIGHT_SIZE_EXPONENT  = 1.38;      /* kurva — sänkt en aning 1.45→1.38 lyfter MELLANSKIKTET (medelstor
                                           fisk blir lite svårare) utan att röra golvet: vid relativStorlek≈0
                                           går svårigheten ändå mot MIN, så småfisk förblir trivial */

/* Avstånd (1 = långt borta, 0 = i håven). */
const FIGHT_START_DISTANCE     = 0.90;  /* startavstånd när fighten börjar */
const FIGHT_DISTANCE_MAX       = 1.0;   /* tak — fisken kan inte dra ut mer lina än så */
const FIGHT_REEL_DISTANCE_RATE = 0.13;  /* avstånd in per sek vid full vev (sänkt → hela fighten något långsammare) */

/* Linspänning (0..1; vid TENSION_MAX brister linan). */
const FIGHT_TENSION_MAX       = 1.0;    /* spänning då linan går av */
const FIGHT_DANGER_ZONE       = 0.84;   /* röd farozon börjar här (matchar HUD-grafiken) */
const FIGHT_REEL_TENSION_RATE = 0.22;   /* spänning per sek vid vev (× difficulty × vevkraft);
                                           koeff. sänkt men difficulty-taket höjt → stor fisk grindar
                                           ändå hårdare och måste pumpas in, småfisk påverkas knappt */
const FIGHT_TENSION_DECAY     = 0.55;   /* spänning som släpper per sek när man ger lina */
const FIGHT_REEL_THRESHOLD    = 0.04;   /* dödzon — vevinput under detta räknas som passiv */

/* Blind-vev-straff: oavbruten vev bygger en EXTRA spänning som växer med hur länge
   man hållit inne — så man tvingas veva i stötar och ge efter ibland i stället för
   att hålla inne. Straffen skalas med fiskens VIKT (inte den art-relativa svårig-
   heten), eftersom en 1,5 kg gädda annars fightas som en liten mört. Under WEIGHT_LOW
   är straffen noll → mört/småabborre förblir triviala och golvet (MIN) är orört. */
const FIGHT_REEL_HOLD_WEIGHT_LOW  = 0.6; /* kg — under detta: ingen blind-vev-straff (småfisk trivial) */
const FIGHT_REEL_HOLD_WEIGHT_FULL = 2.5; /* kg — vid/över detta: full blind-vev-straff */
const FIGHT_REEL_HOLD_RATE  = 0.17;      /* extra spänning per sek av oavbruten vev (× viktfaktor × hålltid) */
const FIGHT_REEL_HOLD_RESET = 6.0;       /* hur snabbt blind-vev-mätaren nollas när man släpper (per sek) — kort släpp räcker */

/* Rusningar (fisken drar; spänningen rusar upp → släpp veven tills den lugnar sig). */
const FIGHT_RUN_FIRST_DELAY    = 2.2;   /* sek innan första rusningen */
const FIGHT_RUN_INTERVAL       = 3.6;   /* sek mellan rusningar (höjt → mer vevtid, lugnare tempo) */
const FIGHT_RUN_DURATION_BASE  = 0.7;   /* grundlängd på en rusning (sek) */
const FIGHT_RUN_DURATION_SCALE = 0.28;  /* extra rusningslängd × difficulty (sänkt så trofé-rusningar inte blir orimligt långa vid högt TAK) */
const FIGHT_RUN_TENSION_RATE   = 0.20;  /* spänning per sek under rusning utan vev (× difficulty);
                                           höjt måttligt 0.15→0.20 så en rusning blir ett akut "släpp nu"-
                                           ögonblick — inte tillbaka till 0.42, så trofé går ändå att klara
                                           genom att gå in i rusningen med låg spänning och ge lina */
const FIGHT_RUN_REEL_PENALTY   = 3.0;   /* extra spänning om man vevar mitt i en rusning (höjt → går inte att hålla inne veven blint på en stor fisk) */
const FIGHT_RUN_DISTANCE_RATE  = 0.05;  /* avstånd fisken drar ut per sek under rusning (× difficulty);

  if (HAPTICS_SUPPORTED) {

/* Mätarvärde (0..1) → längdandel. Släpp i gröna zonen = 1 (max), annars kortare. */
function getCastLengthFactor(meterValue) {
  const d = Math.abs(meterValue - CAST_SWEET_CENTER);
  if (d <= CAST_SWEET_HALF_WIDTH) return 1;
  const accuracy = Math.max(0, 1 - (d - CAST_SWEET_HALF_WIDTH) / CAST_FALLOFF);
  return CAST_MIN_FACTOR + (1 - CAST_MIN_FACTOR) * accuracy;
}

/* Kastlängdens förskjutning av artfördelningen via spoten. Centrerad kring 1 och
   takad, så den bara styr VILKEN art man får — aldrig hur ofta det nappar. */
function getCastSpotMultiplier(speciesId) {
  if (sceneState.castReach == null) return 1;
  const spotDev = SPOTS[gameState.spot].speciesMult[speciesId] - 1;   /* spotens artkaraktär */
  const reachDelta = sceneState.castReach - CAST_REACH_NEUTRAL;       /* + = långt, − = kort */
  const shift = Math.max(-CAST_SPOT_CAP, Math.min(CAST_SPOT_CAP, spotDev * reachDelta * CAST_SPOT_GAIN));
  return 1 + shift;
}

function consumeActiveMeteBait() {

/* Mjuk artbias från betet, klampad mot BAIT_BIAS_CAP så det aldrig blir avgörande. */
function getBaitMultiplier(speciesId) {
  const baitId = getActiveBaitId();
  if (!baitId) return 1;
  const table = BAIT_SPECIES_BIAS[baitId];
  const raw = (table && table[speciesId] != null) ? table[speciesId] : 1;
  return Math.max(1 - BAIT_BIAS_CAP, Math.min(1 + BAIT_BIAS_CAP, raw));
}

/** Skicklighetsbonus som växer med level — kast, hookup-fönster, fight, kontakt. */
function getLevelFactors() {
  const p = Math.min(1, (gameState.level - 1) / LEVEL_SKILL_SPAN);
  return {
    castMax: 0.5 + 0.5 * p,
    hookup: 0.55 + 0.6 * p,
    ease: 1 - 0.28 * p,
    contact: 1 + 0.5 * p,
  };
}

/** Deterministisk fightsvårighet baserad på fiskens storlek RELATIVT sin egen art.
    Liten fisk för arten → trivial fight; trofé → full fight. Level spelar ingen roll. */
function getFightDifficulty(fish) {
  const sp = fish.species;
  /* Artens egna gränser ur ARTDATA: minsta tänkbara → rekord/största. */
  const minWeight = sp.weightClasses.liten[0];
  const maxWeight = Math.max(sp.weightClasses.stor[1], sp.realRecordKg);
  /* Var fiskens vikt ligger i artens spann (0 = pytteliten, 1 = trofé). */
  const relativeSize = Math.max(0, Math.min(1, (fish.weight - minWeight) / (maxWeight - minWeight)));
  const shaped = Math.pow(relativeSize, FIGHT_SIZE_EXPONENT);
  return FIGHT_DIFFICULTY_MIN + (FIGHT_DIFFICULTY_MAX - FIGHT_DIFFICULTY_MIN) * shaped;
}

/* =============================================================================
   FÅNGSTMOTOR
   Nappchans, artval, storleksdragning, kvalitet, kast, fight och scenuppdatering.
   ============================================================================= */

/** Basråvikt för en art givet upplägg (metod × tid × plats × täthet). UTAN bete —
    denna summa styr nappfrekvensen, som betet alltså aldrig påverkar. */
function computeRawWeight(speciesId) {
  const sp = SPECIES[speciesId];
  /* Hård metod-spärr: en spärrad art ger NOLL råpoäng och utesluts helt ur dragningen. */
  if (isSpeciesMethodLocked(speciesId, gameState.method)) return 0;
  const methodMult = METHODS[gameState.method].speciesMult[speciesId];
  const timeMult = TIMES[gameState.time].speciesMult[speciesId];
  const spotMult = SPOTS[gameState.spot].speciesMult[speciesId];
  let weight = sp.density * methodMult * timeMult * spotMult;
  if (sp.isPredator) weight += gameState.level * PREDATOR_LEVEL_BONUS;
  return weight;
}

/** Jämför nuvarande upplägg mot bästa möjliga — styr storleksklass, inte nappfrekvens. */
function computeSetupQuality(speciesId) {
  let current = METHODS[gameState.method].speciesMult[speciesId]
    * TIMES[gameState.time].speciesMult[speciesId]
    * SPOTS[gameState.spot].speciesMult[speciesId];
  /* Långt kast lyfter spotens förutsättningar → större fisk (takat). Påverkar inte frekvensen. */
  if (sceneState.castReach != null) {
    const q = (sceneState.castReach - CAST_REACH_NEUTRAL) * CAST_QUALITY_GAIN;
    current *= 1 + Math.max(-CAST_QUALITY_GAIN, Math.min(CAST_QUALITY_GAIN, q));
  }
  let best = 0;
  for (const methodId in METHODS) {
    if (!isMethodAvailable(methodId)) continue;
    for (const timeId in TIMES) {
      for (const spotId in SPOTS) {
        if (gameState.level < SPOTS[spotId].unlockLevel) continue;
        best = Math.max(best,
          METHODS[methodId].speciesMult[speciesId]
          * TIMES[timeId].speciesMult[speciesId]
          * SPOTS[spotId].speciesMult[speciesId]);
      }
    }
  }
  return best > 0 ? Math.min(1, current / best) : 0;
}

/** Beräknar nappchans och artfördelning för aktuellt upplägg.
    Nappfrekvensen baseras på basvikterna (utan bete). Betet biaserar ENBART
    artfördelningen (rawWeights/sum), så total fångstmängd ändras aldrig. */
function computeBiteOdds() {
  const available = getAvailableSpecies();
  /* Basvikter utan bete → nappfrekvens. */
  const baseSum = available.reduce((acc, id) => acc + computeRawWeight(id), 0);
  let biteChance = BITE_CEILING * baseSum / (baseSum + ODDS_SATURATION);
  biteChance = Math.min(BITE_CEILING, biteChance * (1 + 0.01 * gameState.level) * getGearMultiplier());
  /* Bete + kastlängd biaserar endast vilken art man får (baseSum är orörd → frekvens oförändrad). */
  const rawWeights = available.map(id => ({ id, weight: computeRawWeight(id) * getBaitMultiplier(id) * getCastSpotMultiplier(id) }));
  const sum = rawWeights.reduce((acc, o) => acc + o.weight, 0);
  return { rawWeights, sum, biteChance };
}

/** Hur långt spelaren kommit mot artens fulla storleksspann (0–1). */
function computeSizeReach(speciesId) {
  const sp = SPECIES[speciesId];
  const span = sp.growthLevels || 25;
  return Math.max(0, Math.min(1, (gameState.level - sp.unlockLevel) / span));
}

/** Slumpar art och vikt utifrån odds och kvalitet. */
function pickSpeciesAndSize() {
  const { rawWeights, sum } = computeBiteOdds();
  let roll = Math.random() * sum;
  /* Endast arter med positiv råpoäng kan dras — spärrade (poäng = 0) utesluts helt. */
  let pickId = null;
  for (const entry of rawWeights) {
    if (entry.weight <= 0) continue;
    roll -= entry.weight;
    pickId = entry.id;
    if (roll <= 0) break;
  }
  /* Skyddsnät om allt skulle vara spärrat (då är nappchansen ändå ~0). */
  if (pickId == null) { const fallback = rawWeights.find(e => e.weight > 0); pickId = fallback ? fallback.id : rawWeights[0].id; }
  const sp = SPECIES[pickId];
  const quality = computeSetupQuality(pickId);
  const sizeReach = computeSizeReach(pickId);
  /* Level öppnar fönstret (sizeReach), upplägget trycker uppåt (quality). */
  let storWeight = (0.05 + 0.20 * quality) * sizeReach * sizeReach;
  let braWeight = (0.20 + 0.15 * quality) * sizeReach;
  if (sizeReach < 0.5) storWeight = 0;
  if (sizeReach < 0.15) braWeight = 0;
  let litenWeight = Math.max(0, 1 - storWeight - braWeight);
  /* Level-baserat golvlyft: tonar ut 'liten' med stigande level (0 vid level 1,
     full effekt vid SIZE_LEVEL_MAX). Det bortflyttade fördelas upp till 'bra'
     och 'stor'. Adderas ovanpå uppläggskvaliteten; 'liten' når aldrig noll. */
  const levelProgress = Math.max(0, Math.min(1, (gameState.level - 1) / (SIZE_LEVEL_MAX - 1)));
  const moved = litenWeight * SIZE_LEVEL_LITEN_FADE * levelProgress;
  litenWeight -= moved;
  braWeight  += moved * SIZE_LEVEL_TO_BRA;
  storWeight += moved * (1 - SIZE_LEVEL_TO_BRA);
  /* Spö-bonus: liten, FAST förskjutning av 'liten' upp mot 'bra'/'stor' (ROD_SIZE_BONUS).
     Oberoende av level, samma riktning som ovan. Påverkar bara storlek, ej napp/artval. */
  const rodSizeBonus = getRodById(gameState.rod).sizeBonus || 0;
  const rodMoved = litenWeight * rodSizeBonus;
  litenWeight -= rodMoved;
  braWeight  += rodMoved * SIZE_LEVEL_TO_BRA;
  storWeight += rodMoved * (1 - SIZE_LEVEL_TO_BRA);
  const sizeRoll = Math.random();
  const sizeClass = sizeRoll < storWeight ? 'stor' : sizeRoll < storWeight + braWeight ? 'bra' : 'liten';
  let [lo, hi] = sp.weightClasses[sizeClass];
  if (sizeClass !== 'liten') hi = lo + (hi - lo) * (0.4 + 0.6 * sizeReach);
  else lo = lo + (hi - lo) * 0.4 * sizeReach;
  const weight = +randomRange(lo, Math.max(lo, hi)).toFixed(2);
  return {
    speciesId: pickId,
    species: sp,
    weight,
    sizeClass,
    strength: Math.max(0.12, Math.min(1, weight / 8)),
    near: 0,
    x: lure.x,
    y: lure.y,
  };
}

function storeBiteChanceForCast() { sceneState._bite = computeBiteOdds().biteChance; }

/** Slumpmässigt smånafs under väntan — ger INGET hugg, bara spänning. */
function triggerFakeNibble(now) {
  const pos = (sceneState.mode === 'mete_wait')
    ? { x: lure.x, y: lure.y }
    : getLurePosition(now);
  const pattern = Math.random() < 0.6 ? [14] : [20, 30];
  triggerHaptic(pattern, 2);
  ripples.push({ x: pos.x, y: pos.y, r: 1, max: 16, life: 1 });
}

function triggerBite() {
  hookedFish = pickSpeciesAndSize();
  sceneState.mode = 'bite';
  const haptic = HAPTIC_PROFILES[hookedFish.speciesId];
  triggerHaptic(haptic.bite, haptic.sh);
  ripples.push({ x: lure.x, y: lure.y, r: 2, max: 55, life: 1 });
  strikeTimer = getLevelFactors().hookup;
  showStrikeButton(true);
  showLiftButton(false);
  setHint('Hugg! Slå an (vänster).');
}

function onStrike() {
  showStrikeButton(false);
  screenShake = 10;
  triggerHaptic([45], 0);
  spawnSplash(lure.x, lure.y, 14);
  startFight();
}

function onMissedBite() {
  hookedFish = null;
  showStrikeButton(false);
  showToast('För sent — fisken slet sig.');
  resetToReady();
}

function onNoBite() {
  showToast('Inget napp — prova ett annat upplägg.');
  resetToReady();
}

function startFight() {
  sceneState.mode = 'fight';
  const difficulty = getFightDifficulty(hookedFish);
  fightState = {
    tension: 0,
    distance: FIGHT_START_DISTANCE,
    difficulty,
    runDuration: FIGHT_RUN_DURATION_BASE + difficulty * FIGHT_RUN_DURATION_SCALE,
    running: false,
    runTimer: FIGHT_RUN_FIRST_DELAY,   /* tid kvar till nästa rusning */
    runRemaining: 0,                   /* tid kvar av pågående rusning */
    slack: 0,                          /* passivitetsmätare (lugn fas utan vev) */
    reelHold: 0,                       /* sek oavbruten vev — driver blind-vev-straffen */
    pulseTimer: 0,
    last: performance.now(),
  };
  getEl('hud').classList.add('on');
  showReelPad(true);
  showLiftButton(false);
  showStrikeButton(false);
  setHint('Reva (höger) — släpp veven när den rusar.');
}

function endFight() {
  getEl('hud').classList.remove('on');
  showReelPad(false);
  getEl('rw').classList.remove('on');
  fightState = null;
}

function tickFight(now) {
  if (sceneState.mode !== 'fight' || !fightState) return;
  const fs = fightState;
  const dt = Math.min(0.05, (now - fs.last) / 1000);
  fs.last = now;
  const input = consumeReelInput(dt);
  const reeling = input > FIGHT_REEL_THRESHOLD;
  const haptic = HAPTIC_PROFILES[hookedFish.speciesId];

  /* Haptik-puls i fightrytm (snabbare i röd farozon och under rusning). Återanvänder haptik-/skakmotorn. */
  const inDanger = fs.tension >= FIGHT_DANGER_ZONE;
  fs.pulseTimer -= dt;
  if (fs.pulseTimer <= 0) {
    triggerHaptic(haptic.pulse, haptic.sh * (inDanger ? 1.3 : fs.running ? 0.9 : 0.45));
    fs.pulseTimer = inDanger ? haptic.iv * 0.45 : fs.running ? haptic.iv * 0.6 : haptic.iv;
  }

  /* Deterministisk schemaläggning av rusningar — ingen slump. */
  if (fs.running) {
    fs.runRemaining -= dt;
    if (fs.runRemaining <= 0) {
      fs.running = false;
      fs.runTimer = FIGHT_RUN_INTERVAL;
      getEl('rw').classList.remove('on');
    }
  } else {
    fs.runTimer -= dt;
    if (fs.runTimer <= 0 && fs.distance > FIGHT_RUN_MIN_DISTANCE) {
      fs.running = true;
      fs.runRemaining = fs.runDuration;
      getEl('rw').classList.add('on');
      triggerHaptic(haptic.pulse, haptic.sh * 1.2);   /* skärmskak vid rusningsstart */
    }
  }

  /* Blind-vev-mätare: växer vid oavbruten vev, nollas snabbt när man släpper. */
  if (reeling) fs.reelHold += dt;
  else fs.reelHold = Math.max(0, fs.reelHold - FIGHT_REEL_HOLD_RESET * dt);

  /* Spänning, avstånd och passivitet. */
  if (fs.running) {
    /* Rusning: spänningen rusar upp. Vevar man mitt i straffas det hårt. */
    fs.tension += FIGHT_RUN_TENSION_RATE * fs.difficulty * (reeling ? FIGHT_RUN_REEL_PENALTY : 1) * dt;
    fs.distance += FIGHT_RUN_DISTANCE_RATE * fs.difficulty * dt;
    fs.slack = 0;   /* under rusning SKA man vara passiv — ingen straffräkning */
  } else if (reeling) {
    /* Vev: avståndet minskar men spänningen stiger. Att hålla inne kontinuerligt
       bygger en extra, växande spänning (skalad med fiskens vikt × hålltid) — pumpa
       i stötar och ge efter ibland för att hålla nere den. Småfisk under WEIGHT_LOW
       får viktfaktor 0 och påverkas inte alls. */
    const holdWeight = Math.max(0, Math.min(1,
      (hookedFish.weight - FIGHT_REEL_HOLD_WEIGHT_LOW) / (FIGHT_REEL_HOLD_WEIGHT_FULL - FIGHT_REEL_HOLD_WEIGHT_LOW)));
    fs.tension += (FIGHT_REEL_TENSION_RATE * fs.difficulty * (0.5 + input)
                + FIGHT_REEL_HOLD_RATE * holdWeight * fs.reelHold * input) * dt;
    fs.distance -= FIGHT_REEL_DISTANCE_RATE * input * dt;
    fs.slack = 0;
  } else {
    /* Lugn fas utan vev: spänningen släpper, men passiviteten tickar mot tappad fisk. */
    fs.tension -= FIGHT_TENSION_DECAY * dt;
    fs.slack += dt;
  }

  fs.tension = Math.max(0, fs.tension);
  fs.distance = Math.max(0, Math.min(FIGHT_DISTANCE_MAX, fs.distance));
  rodBend = 0.25 + fs.tension * 0.85;
  hookedFish.near = 1 - fs.distance;

  /* HUD: spänning (med röd farozon i grafiken) + avståndsmätare. */
  const tensionPct = Math.min(100, fs.tension / FIGHT_TENSION_MAX * 100);
  getEl('tf').style.width = tensionPct + '%';
  getEl('tp').textContent = Math.round(tensionPct) + '%';
  getEl('df').style.width = (fs.distance * 100) + '%';
  getEl('dp').textContent = fs.distance > 0.66 ? 'Långt borta' : fs.distance > 0.25 ? 'På väg in' : 'Nära håven';

  /* Förlust/vinst — helt deterministiskt utifrån spelarens timing. */
  if (fs.tension >= FIGHT_TENSION_MAX) return onLineSnap();
  if (fs.slack >= FIGHT_SLACK_MAX) return onFishOff();
  if (fs.distance <= 0) return onFishSurfaced();
}

function onLineSnap() {
  sceneState.mode = 'result';
  screenShake = 14;
  triggerHaptic([200, 90, 200], 14);
  spawnSplash(hookedFish.x, hookedFish.y, 20);
  endFight();
  setTimeout(() => showCatchResultModal(false, 'snap'), 420);
}

/* Fisken lossnar för att spelaren varit passiv för länge (deterministiskt). */
function onFishOff() {
  sceneState.mode = 'result';
  screenShake = 10;
  triggerHaptic([120, 60], 10);
  spawnSplash(hookedFish.x, hookedFish.y, 14);
  endFight();
  setTimeout(() => showCatchResultModal(false, 'slack'), 420);
}

function onFishSurfaced() {
  sceneState.mode = 'surface';
  showReelPad(false);
  getEl('rw').classList.remove('on');
  hookedFish.lift = 0;
  hookedFish.thrash = 1;
  spawnSplash(hookedFish.x, waterLineY() + 18, 22);
  setTimeout(() => {
    getEl('hud').classList.remove('on');
    processLandingRewards();
  }, 900);
}

function onJigLift() { lure.phase = 'lift'; lure.pt = 0; }

/** Återställer fiskeläge till "redo att kasta". */
function resetToReady() {
  sceneState.mode = 'ready';
  rodBend = 0;
  hookedFish = null;
  fightState = null;
  lure.startX = null;
  lure.startY = null;
  lure.prog = 0;
  castCharge = null;
  sceneState.castReach = null;   /* ingen aktiv kast-koppling i redoläge */
  getEl('hud').classList.remove('on');
  showReelPad(false);
  showLiftButton(false);
  showStrikeButton(false);
  getEl('dock').style.opacity = 1;
  const mechanic = getCurrentMechanic();
  if (mechanic === 'passive') {
    getEl('castBtn').classList.remove('hidden');
    getEl('castBtn').textContent = 'Kasta ut';
    getEl('uplBtn').classList.remove('hidden');
    setHint('');
  } else {
    getEl('castBtn').classList.add('hidden');
    getEl('uplBtn').classList.remove('hidden');
    setHint('Håll på vattnet för att ladda kastet — släpp i gröna zonen.');
  }
}

/** Beräknar mål-Y i vattnet från en längdandel (0..1). Större → längre ut mot horisonten. */
function castTargetY(castLen) {
  return waterLineY() + CAST_NEAR_OFFSET - castLen * (CAST_NEAR_OFFSET - CAST_FAR_OFFSET);
}

function castMete() {
  storeBiteChanceForCast();
  /* Mete har ingen mätare — fast längdandel × spöets castMax. */
  const castLen = CAST_METE_FACTOR * getRodCastMax();
  sceneState.castReach = castLen;   /* koppling till fångst (förskjuter, ökar ej frekvens) */
  const target = { x: canvasW * (0.32 + Math.random() * 0.3), y: castTargetY(castLen) };
  sceneState.mode = 'cast';
  castAnim = { t: 0, from: getRodTip(), to: target, dur: 0.6, isMete: true, arc: canvasH * (0.14 + 0.18 * castLen) };
  getEl('castBtn').classList.add('hidden');
  getEl('uplBtn').classList.add('hidden');
  getEl('dock').style.opacity = 0.2;
}

function releasePowerCast() {
  const meter = castCharge.power;
  const aimX = castCharge.x;
  castCharge = null;
  if (meter < 0.04) { resetToReady(); return; }   /* knappt laddat — avbryt */
  storeBiteChanceForCast();
  /* Sweet spot → längdandel, takad av spöets egen castMax. */
  const lengthFactor = getCastLengthFactor(meter);
  const castLen = lengthFactor * getRodCastMax();
  sceneState.castReach = castLen;   /* koppling till fångst (förskjuter, ökar ej frekvens) */
  const targetY = castTargetY(castLen);
  const targetX = Math.max(canvasW * 0.14, Math.min(canvasW * 0.82, aimX));
  sceneState.mode = 'cast';
  castAnim = { t: 0, from: getRodTip(), to: { x: targetX, y: targetY }, dur: 0.55, arc: canvasH * (0.14 + 0.18 * castLen) };
  if (lengthFactor >= 0.999) showToast('Perfekt kast!');
  else if (lengthFactor > 0.7) showToast('Bra kast!');
  setHint('');
  getEl('dock').style.opacity = 0.2;
}

/** Normaliserar vev-input från touch/drag till 0–1.3 hastighet. */
function consumeReelInput(dt) {
  const speed = reelAccum / Math.max(dt, 0.001);
  reelAccum = 0;
  return Math.max(0, Math.min(1.3, speed / 650));
}

function getRodTip() { return { x: canvasW * 0.60 - rodBend * 22, y: canvasH * 0.50 + rodBend * 46 }; }

function spawnSplash(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = randomRange(-Math.PI * 0.85, -Math.PI * 0.15);
    const speed = randomRange(40, 150);
    splashParts.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1 });
  }
}

function getLurePosition(now) {
  const tip = getRodTip();
  if (sceneState.mode === 'spin') {
    return {
      x: lure.startX + (tip.x - lure.startX) * lure.prog,
      y: lure.startY + (tip.y - lure.startY) * lure.prog + Math.sin(now / 120) * 2,
    };
  }
  if (sceneState.mode === 'jig') {
    const bx = lure.startX + (tip.x - lure.startX) * lure.prog;
    const by = lure.startY + (tip.y - lure.startY) * lure.prog;
    return { x: bx, y: by - (lure.height || 0) * 34 };
  }
  return { x: lure.x, y: lure.y };
}

/** Uppdaterar fiskelogik varje frame (kast, väntan, fight, partiklar). */
function updateFishingScene(dt, now) {
  const waiting = sceneState.mode === 'mete_wait' || sceneState.mode === 'spin' || sceneState.mode === 'jig';
  if (waiting) {
    if (sceneState._nibbleAt == null) sceneState._nibbleAt = now + 1400 + Math.random() * 2800;
    else if (now >= sceneState._nibbleAt) {
      triggerFakeNibble(now);
      sceneState._nibbleAt = now + 1800 + Math.random() * 3800;
    }
  } else {
    sceneState._nibbleAt = null;
  }
  if (sceneState.mode === 'charging' && castCharge) {
    castCharge.t += dt;
    /* Triangelvåg 0→1→0; CAST_OSCILLATION_SPEED styr pendlingshastigheten. */
    const phase = (castCharge.t * CAST_OSCILLATION_SPEED) % 1.0;
    castCharge.power = phase < 0.5 ? phase * 2 : (1 - phase) * 2;
    rodBend = -(0.3 + 0.25 * castCharge.power);
  }
  if (sceneState.mode === 'cast') {
    castAnim.t += dt;
    const p = Math.min(1, castAnim.t / castAnim.dur);
    const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
    const arc = castAnim.arc || canvasH * 0.22;   /* längre kast → högre båge */
    lure.x = castAnim.from.x + (castAnim.to.x - castAnim.from.x) * ease;
    lure.y = castAnim.from.y + (castAnim.to.y - castAnim.from.y) * ease - Math.sin(p * Math.PI) * arc;
    rodBend = Math.sin(Math.min(1, castAnim.t / 0.16) * Math.PI) * 0.55;
    if (p >= 1) {
      rodBend = 0;
      spawnSplash(lure.x, lure.y, 8);
      ripples.push({ x: lure.x, y: lure.y, r: 2, max: 44, life: 1 });
      lure.startX = lure.x;
      lure.startY = lure.y;
      lure.prog = 0;
      if (castAnim.isMete) {
        sceneState.mode = 'mete_wait';
        sceneState._wait = 1 + Math.random() * 2.2;
      } else if (getCurrentMechanic() === 'retrieve') {
        sceneState.mode = 'spin';
        showReelPad(true);
        setHint('Dra upp/ner (höger) för att reva in — nappar inte varje kast.');
      } else {
        sceneState.mode = 'jig';
        lure.phase = 'rest';
        lure.pt = 0;
        lure.height = 0;
        showLiftButton(true);
        showReelPad(true);
        setHint('Lyft (vänster) → låt sjunka → reva (höger). Hugg på vevstoppet.');
      }
    }
  }
  if (sceneState.mode === 'mete_wait') {
    sceneState._wait -= dt;
    lure.bob += dt * 2.2;
    if (Math.random() < dt * 0.5) ripples.push({ x: lure.x + randomRange(-8, 8), y: lure.y, r: 1, max: 18, life: 1 });
    if (sceneState._wait <= 0) {
      if (Math.random() < sceneState._bite) triggerBite();
      else onNoBite();
    }
  }
  if (sceneState.mode === 'spin') {
    const input = consumeReelInput(dt);
    lure.prog = Math.min(1, lure.prog + input * 0.16 * dt * 1.3);
    if (input > 0.08 && lure.prog < 0.96) {
      const biteProb = dt * sceneState._bite * 1.2 * getLevelFactors().contact * (0.6 + 0.4 * input);
      if (Math.random() < biteProb) triggerBite();
    }
    if (lure.prog >= 1 && sceneState.mode === 'spin') {
      showToast('Inget napp — kasta igen.');
      resetToReady();
    }
  }
  if (sceneState.mode === 'jig') {
    if (lure.phase === 'lift') {
      lure.pt += dt;
      lure.height = Math.min(1, lure.pt / 0.34);
      if (lure.pt >= 0.34) { lure.phase = 'drop'; lure.pt = 0; }
    } else if (lure.phase === 'drop') {
      lure.pt += dt;
      lure.height = Math.max(0, 1 - lure.pt / 0.95);
      const biteProb = dt * sceneState._bite * 0.3 * getLevelFactors().contact * (0.5 + 0.5 * (1 - lure.height));
      if (Math.random() < biteProb) triggerBite();
      if (lure.pt >= 0.95) { lure.phase = 'rest'; lure.pt = 0; lure.height = 0; }
    } else {
      lure.pt += dt;
    }
    const input = consumeReelInput(dt);
    if (input > 0.08) lure.prog = Math.min(1, lure.prog + input * 0.16 * dt * 0.8);
    if (lure.prog >= 1 && sceneState.mode === 'jig') {
      showToast('Inarbetat — kasta igen.');
      resetToReady();
    }
  }
  if (sceneState.mode === 'bite') {
    strikeTimer -= dt;
    if (strikeTimer <= 0) onMissedBite();
  }
  if (sceneState.mode === 'fight') tickFight(now);
  if (sceneState.mode === 'surface' && hookedFish) {
    if (hookedFish.lift != null && hookedFish.lift < 1) hookedFish.lift = Math.min(1, hookedFish.lift + dt * 1.2);
    hookedFish.thrash = Math.max(0, (hookedFish.thrash || 0) - dt * 0.7);
  }
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 30);
  splashParts.forEach(p => { p.vy += 420 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1.4; });
  splashParts = splashParts.filter(p => p.life > 0);
  ripples.forEach(r => { r.r += (r.max - r.r) * dt * 2.4; r.life -= dt * 0.9; });
  ripples = ripples.filter(r => r.life > 0);
}

/* =============================================================================
   EKONOMI
   Försäljning, belöningar vid landning, shop-köp och valutor (kr / pärlor).
   ============================================================================= */

/** Beräknar XP och belöningar när fisken landats — uppdaterar logg och valutor indirekt. */
/* Hur stor fisken är inom sin egen arts spann (0 = pytteliten, 1 = trofé).
   Samma art-relativa logik som fightsvårigheten använder. */
function getSpeciesRelativeSize(fish) {
  const sp = fish.species;
  const minWeight = sp.weightClasses.liten[0];
  const maxWeight = Math.max(sp.weightClasses.stor[1], sp.realRecordKg);
  return Math.max(0, Math.min(1, (fish.weight - minWeight) / (maxWeight - minWeight)));
}

/* Grund-XP för en fångad fisk: art-bas × art-relativ storlek. Liten mört ≈ 5 XP,
   stor gädda betydligt mer. (Milstolpsbonusar läggs på i processLandingRewards.) */
function computeFishXp(fish) {
  const base = XP_FISH_BASE[fish.speciesId] != null ? XP_FISH_BASE[fish.speciesId] : XP_FISH_BASE_DEFAULT;
  return Math.round(base * (1 + XP_FISH_SIZE_BONUS * getSpeciesRelativeSize(fish)));
}

/* Försäljningspris i FG: art-bas × art-relativ storlek (samma logik som XP).
   Liten nybörjarfisk ≈ 5 FG, stor fisk för arten betydligt mer. */
function computeFishPrice(fish) {
  const base = FG_FISH_BASE[fish.speciesId] != null ? FG_FISH_BASE[fish.speciesId] : FG_FISH_BASE_DEFAULT;
  return Math.round(base * (1 + FG_FISH_SIZE_BONUS * getSpeciesRelativeSize(fish)));
}

function processLandingRewards() {
  const fish = hookedFish;
  /* Förbrukning: mete drar 1 av aktivt bete vid landad fångst (spinn/vert/troll drar inget). */
  if (gameState.method === 'mete') consumeActiveMeteBait();
  const logEntry = gameState.log[fish.speciesId];
  const sp = fish.species;
  const sellValue = computeFishPrice(fish);
  let xpGain = computeFishXp(fish);
  const rewardLines = [];

  if (!logEntry.seen) {
    logEntry.seen = true;
    xpGain += 15;
    gameState.kronor += 10;
    rewardLines.push(['Ny art i loggen', '+15 XP, +10 FG']);
  }
  logEntry.count++;
  const hadClass = logEntry.sizeClasses[fish.sizeClass];
  logEntry.sizeClasses[fish.sizeClass]++;
  if (!hadClass && logEntry.sizeClasses.liten && logEntry.sizeClasses.bra && logEntry.sizeClasses.stor) {
    rewardLines.push(['Alla storleksklasser!', 'Tema-spö upplåst']);
  }
  if (fish.weight > logEntry.personalBest) {
    logEntry.personalBest = fish.weight;
    xpGain += 8;
    rewardLines.push(['Nytt personligt rekord', '+8 XP']);
  }
  if (fish.weight > logEntry.lakeRecord && !logEntry.beatLakeRecord) {
    logEntry.beatLakeRecord = true;
    logEntry.lakeRecord = fish.weight;
    gameState.pearls += 2;
    rewardLines.push(['Slog spelets sjörekord', 'Titel + ◈2']);
  }
  if (fish.weight >= sp.realRecordKg && !logEntry.beatRealRecord) {
    logEntry.beatRealRecord = true;
    gameState.pearls += 10;
    rewardLines.push(['Tangerar verkliga rekordet!', 'Trofé + ◈10']);
  }
  fish.value = sellValue;
  fish.xp = xpGain;
  fish.rewards = rewardLines;
  showCatchResultModal(true);
}

/** Ger metodens gratisbete när ett spö köps (om inget bete för metoden ägs). */
function grantMethodDefaultBaits(rod) {
  rod.methods.forEach(methodId => {
    const ownsSome = BAIT_ORDER.some(id => BAITS[id].method === methodId && gameState.ownedBaits.has(id));
    if (ownsSome) return;
    const def = BAIT_ORDER.find(id => BAITS[id].method === methodId && BAITS[id].methodDefault);
    if (def) { gameState.ownedBaits.add(def); gameState.bait[methodId] = def; }
  });
}

/** Shoppen KÖPER bara (spön/bete med FG, skins med pärlor). Allt byte/utrustning
    av gear (spö, mete-bete) sker i fiskeväskan — inte här. Skins är kosmetiska och
    sätts fortfarande på i shoppen (ingår inte i gear-väskan). */
function handleShopAction(action) {
  if (gameState.shopCategory === 'rods') {
    const rod = getRodById(gameState.selRod);
    if (action === 'buy') {
      if (!isRodUnlocked(rod)) return;                 /* låst av level */
      if (gameState.kronor >= rod.price) {
        gameState.kronor -= rod.price;
        gameState.ownedRods.add(rod.id);
        grantMethodDefaultBaits(rod);                  /* metodens gratisbete (upplåsning, ej "utrusta") */
        renderInventory();                             /* nytt spö dyker upp i väskan */
        showToast(rod.name + ' köpt!');
      } else {
        showToast('För lite FG — köp blockerat');
      }
    }
  } else if (gameState.shopCategory === 'baits') {
    const bait = BAITS[gameState.selBait];
    if (action === 'qminus') {
      gameState.baitBuyQty = Math.max(BAIT_BUY_MIN, gameState.baitBuyQty - BAIT_BUY_STEP);
    } else if (action === 'qplus') {
      gameState.baitBuyQty += BAIT_BUY_STEP;
    } else if (action === 'buyqty') {
      /* Köp förbrukningsbart bete i antal — läggs till i väskans befintliga antal. */
      if (!ownsRodForMethod(bait.method)) return;      /* kräver spö för metoden */
      const qty = gameState.baitBuyQty;
      const total = qty * BAIT_UNIT_PRICE;
      if (gameState.kronor >= total) {
        gameState.kronor -= total;
        gameState.baitCounts[bait.id] = getBaitCount(bait.id) + qty;
        gameState.ownedBaits.add(bait.id);            /* markera som upptäckt */
        renderInventory();
        showToast(bait.name + ' ×' + qty + ' köpt!');
      } else {
        showToast('För lite FG — köp blockerat');
      }
    } else if (action === 'buy') {
      /* Engångsköp för eviga beten (ej förbrukningsbara). Utrustas i väskan, inte här. */
      if (!ownsRodForMethod(bait.method)) return;      /* kräver spö för metoden */
      const price = BAIT_PRICES[bait.id];
      if (gameState.kronor >= price) {
        gameState.kronor -= price;
        gameState.ownedBaits.add(bait.id);
        renderInventory();
        showToast(bait.name + ' köpt!');
      } else {
        showToast('För lite FG — köp blockerat');
      }
    }
    if (gameState.method === bait.method) { renderSetupChips(); renderOddsBar(); }
  } else if (gameState.shopCategory === 'boat') {
    if (action === 'buy' && !gameState.ownedBoat) {
      if (!isBoatUnlocked()) return;                    /* låst av level */
      if (gameState.kronor >= BOAT.price) {
        gameState.kronor -= BOAT.price;
        gameState.ownedBoat = true;
        renderSetupChips();                             /* båt-metoder kan nu bli valbara */
        renderOddsBar();
        renderInventory();
        showToast(BOAT.name + ' köpt!');
      }
    }
  } else {
    /* Skins är kosmetiska — köp med pärlor och sätt på direkt (ej en del av gear-väskan). */
    const skin = SKINS.find(s => s.id === gameState.selSkin);
    if (action === 'buy') {
      if (gameState.pearls >= skin.price) {
        gameState.pearls -= skin.price;
        gameState.ownedSkins.add(skin.id);
        showToast(skin.name + ' köpt!');
      }
    } else {
      gameState.skin = skin.id;
      showToast(skin.name + ' pålagd');
    }
  }
  updateStatusBar();
  renderShopHero();
  renderShopInfo();
  renderShelf();
}

/* =============================================================================
   PROGRESSION
   XP, levelup och meddelanden om upplåsta arter, platser och metoder.
   ============================================================================= */

/* Uppmuntrande/fiskenyttiga rader när en nivå inte låser upp något konkret. */
const LEVELUP_TIPS = [
  'Sikta på ett nytt personligt rekord!',
  'Tips: längre kast förskjuter fångsten mot större fisk.',
  'Tips: att släppa fisken ger mer XP än att behålla den.',
  'Tips: rätt bete nudgar fångsten mot din målart.',
  'Tips: stor fisk för arten ger mer XP och mer FG.',
  'Fortsätt fiska — nästa spö närmar sig!',
];

function grantXp(amount) {
  gameState.xp += amount;
  let reachedLevel = null;
  const unlocks = [];   /* samlas över alla nivåer som passeras (t.ex. debug +5) */
  while (gameState.xp >= xpRequiredForLevel(gameState.level)) {
    gameState.xp -= xpRequiredForLevel(gameState.level);
    gameState.level++;
    reachedLevel = gameState.level;
    /* Upplåsningsinfo hämtas från de level-gates som redan finns i konfigurationen. */
    SPECIES_ORDER.filter(id => SPECIES[id].unlockLevel === gameState.level)
      .forEach(id => unlocks.push('Ny art: ' + SPECIES[id].name));
    RODS.filter(r => r.unlockLevel === gameState.level)
      .forEach(r => unlocks.push('Nytt spö: ' + r.name + ' (shop)'));
    if (SPOTS.rev.unlockLevel === gameState.level) unlocks.push('Ny plats: Stenrev');
    if (SPOTS.djup.unlockLevel === gameState.level) unlocks.push('Ny plats: Djupkant');
    if (gameState.level === BOAT_UNLOCK_LEVEL) unlocks.push('Båt (köp i shop)');
  }
  /* Visa "Grattis"-rutan för den nivå spelaren nådde, med upplåsningar eller ett tips. */
  if (reachedLevel !== null) setTimeout(() => showLevelUp(reachedLevel, unlocks), 150);
}

/** Visar level-up-rutan: vad som låses upp på nivån, annars en uppmuntrande rad. */
function showLevelUp(level, unlocks) {
  getEl('luTitle').textContent = 'Grattis – nivå ' + level + '!';
  const body = getEl('luBody');
  if (unlocks.length) {
    body.innerHTML = '<div class="head">Upplåst på denna nivå</div>'
      + unlocks.map(u => `<div class="rl"><span class="b">${u}</span></div>`).join('');
  } else {
    body.innerHTML = `<div class="rl"><span>${LEVELUP_TIPS[level % LEVELUP_TIPS.length]}</span></div>`;
  }
  getEl('luBtn').onclick = () => getEl('lvlup').classList.remove('on');
  getEl('lvlup').classList.add('on');
}

function renderCatchLog() {
  const listEl = getEl('loglist');
  listEl.innerHTML = '';
  SPECIES_ORDER.forEach(id => {

          <span class="lc">${seen ? logEntry.count + ' fångade' : ''}</span>
        </div>
        ${seen ? `
          <div class="lcl">${classChip('liten')}${classChip('bra')}${classChip('stor')}</div>
          <div class="lrec">

            <div class="spel"><div class="l2">Sjörekord</div><div class="v2">${formatWeight(logEntry.lakeRecord)}</div></div>
            <div class="verk"><div class="l2">Verkligt</div><div class="v2">${formatWeight(sp.realRecordKg)}</div></div>
          </div>` : ''}

}

/* =============================================================================
   UI
   All rendering och skärmuppdatering: HUD, canvas, shop, modal, toast.
   ============================================================================= */

function updateStatusBar() {
  getEl('lvlb').textContent = gameState.level;
  getEl('kr').textContent = Math.round(gameState.kronor).toLocaleString('sv-SE') + ' FG';
  getEl('pe').textContent = '◈ ' + gameState.pearls;
  /* Mätaren fylls per nivå (inom-nivå-progress) — level-logiken är oförändrad.
     Texten visar ACKUMULERAD total-XP mot nästa nivås kumulativa tröskel. */
  const needed = xpRequiredForLevel(gameState.level);
  const levelBase = cumulativeXpForLevel(gameState.level);      /* total-XP vid nivåns början */
  const totalXp = Math.round(levelBase + gameState.xp);         /* ackumulerad total-XP */
  const nextThreshold = Math.round(levelBase + needed);         /* kumulativ tröskel för nästa nivå */
  getEl('xpf').style.width = Math.min(100, gameState.xp / needed * 100) + '%';
  getEl('xpt').textContent = totalXp + ' / ' + nextThreshold + ' XP';
}

function makeChipHtml(label, active, unlocked) {
  return `<button class="chip ${unlocked ? '' : 'locked'}" aria-pressed="${active}" ${unlocked ? '' : 'aria-disabled="true"'}">${label}</button>`;
}

/** Renderar valchips för plats, metod och tid i uppläggspanelen. */
function renderSetupChips() {
  let html = '';
  for (const id in SPOTS) {
    html += `<span data-g="spot" data-k="${id}">${makeChipHtml(SPOTS[id].name, gameState.spot === id, gameState.level >= SPOTS[id].unlockLevel)}</span>`;
  }
  getEl('spots').innerHTML = html;
  html = '';
  for (const id in METHODS) {
    html += `<span data-g="method" data-k="${id}">${makeChipHtml(METHODS[id].name, gameState.method === id, isMethodAvailable(id))}</span>`;
  }
  getEl('methods').innerHTML = html;
  /* Bete för aktuell metod — upplåst = ägt (köps i shoppen). */
  html = '';
  BAIT_ORDER.filter(id => BAITS[id].method === gameState.method).forEach(id => {
    /* Förbrukningsbart bete visar antal (×N); tillgängligt = antal > 0 (annars ägt). */
    const label = BAITS[id].consumable ? `${BAITS[id].name} ×${getBaitCount(id)}` : BAITS[id].name;
    html += `<span data-g="bait" data-k="${id}">${makeChipHtml(label, gameState.bait[gameState.method] === id, isBaitAvailable(id))}</span>`;
  });
  getEl('baits').innerHTML = html || '<span style="font-size:12px;color:var(--muted)">Inget bete</span>';
  html = '';
  for (const id in TIMES) {
    html += `<span data-g="time" data-k="${id}">${makeChipHtml(TIMES[id].name, gameState.time === id, true)}</span>`;
  }
  getEl('times').innerHTML = html;
  bindSetupChipHandlers();
}

function renderOddsBar() {
  const { rawWeights, sum, biteChance } = computeBiteOdds();
  getEl('nappv').textContent = Math.round(biteChance * 100) + '%';
  const bar = getEl('obar');
  bar.innerHTML = '';
  rawWeights.slice().sort((a, b) => b.weight - a.weight).forEach(entry => {
    const pct = sum > 0 ? entry.weight / sum * 100 : 0;
    bar.insertAdjacentHTML('beforeend',
      `<div class="oseg" style="width:${pct}%;background:${getCssVar(SPECIES[entry.id].colorVar)}"></div>`);
  });
  const baitId = getActiveBaitId();
  const baitName = baitId ? ' · ' + BAITS[baitId].name : '';
  getEl('legtxt').textContent = SPOTS[gameState.spot].name + ' · ' + METHODS[gameState.method].name + baitName + ' · ' + TIMES[gameState.time].name;
}

/* Sätts av betesförbrukningen när tröskeln nås; visas när fångstrutan stängts. */
let lowBaitWarningId = null;

/* "Snart slut på bete"-ruta: mjuk förvarning vid LOW_BAIT_WARNING_THRESHOLD kvar.
   Spärrar inte fisket (det gör 0-spärren), utan tipsar om att fylla på i shoppen. */
function showLowBaitWarning(baitId) {
  const modal = getEl('modal');
  const card = getEl('mcard');
  const name = BAITS[baitId].name;
  const count = getBaitCount(baitId);
  card.innerHTML = `
    <p class="sub">Snart slut på bete</p>
    <h2 class="lvlh">${name} ×${count}</h2>
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin:6px 0 4px">
      Det börjar ta slut. Tips: spara och sälj fisk för FG så har du råd att köpa mer bete i shoppen innan det tar helt slut.
    </p>
    <div class="mbtns">
      <button class="mb primary" id="lbShop">Till shoppen</button>
      <button class="mb" id="lbClose">Fortsätt fiska</button>
    </div>`;
  modal.classList.add('on');
  getEl('lbClose').onclick = () => modal.classList.remove('on');
  getEl('lbShop').onclick = () => { modal.classList.remove('on'); switchTab('shop'); };
}

/* "Slut på bete"-ruta: visas när aktivt mete-bete är 0. Erbjuder byte till annat
   mete-bete man har antal av, samt en väg till shoppen. */
function showOutOfBaitModal() {
  const modal = getEl('modal');
  const card = getEl('mcard');
  const activeId = gameState.bait.mete;
  const activeName = activeId ? BAITS[activeId].name : 'Bete';
  /* Andra mete-beten spelaren har antal av (kan byta till direkt). */
  const alternatives = BAIT_ORDER.filter(id =>
    BAITS[id].method === 'mete' && id !== activeId && isBaitAvailable(id));
  let altHtml = '';
  if (alternatives.length) {
    altHtml = '<div class="obalts">' + alternatives.map(id =>
      `<button class="obalt" data-bait="${id}">Byt till ${BAITS[id].name} ×${getBaitCount(id)}</button>`).join('') + '</div>';
  }
