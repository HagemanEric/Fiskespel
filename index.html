<!DOCTYPE html>
<html lang="sv">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Munksjön — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#06121a;--panel:#12303a;--panel-2:#19404c;--line:#2a4f5c;--ink:#eef5f6;--muted:#92aab2;
    --copper:#d6a15c;--copper-bright:#ecbd7a;--cyan:#5fc0d4;--gold:#f2cd62;--danger:#df6f5d;--reed:#8aa57f;
    --mort:#9aa873;--abborre:#4ea3b0;--braxen:#c0a36a;--gadda:#6f9e6a;--gos:#8a93c0;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  .app{position:relative;width:100%;max-width:480px;height:100vh;height:100dvh;margin:0 auto;display:flex;flex-direction:column}
  .topbar{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 14px 8px;z-index:8;background:linear-gradient(180deg,rgba(6,18,26,.96),rgba(6,18,26,.6))}
  .lvl{display:flex;align-items:center;gap:8px}
  .lvlb{font-family:'Fraunces';font-weight:800;font-size:17px;background:var(--copper);color:#26190a;width:32px;height:32px;border-radius:9px;display:grid;place-items:center;line-height:1}
  .xpbar{height:6px;background:#0b1f27;border:1px solid var(--line);border-radius:20px;overflow:hidden;min-width:60px}
  .xpf{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--copper));transition:width .5s}
  .xpt{font-family:'IBM Plex Mono';font-size:9px;color:var(--muted);margin-top:3px}
  .cur{text-align:right;font-family:'IBM Plex Mono';font-weight:600}
  .cur .kr{font-size:14px;color:var(--copper-bright)} .cur .pe{font-size:11px;color:var(--gold)}
  .tabbar{display:flex;gap:6px;padding:0 14px 8px;z-index:8}
  .tab{flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:10px;padding:9px;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
  .tab[aria-selected="true"]{background:var(--panel);color:var(--ink);border-color:var(--cyan)}
  .screens{position:relative;flex:1;min-height:0}
  .screen{position:absolute;inset:0;display:none}.screen.on{display:block}.screen.scroll{overflow-y:auto;padding:4px 14px 24px}

  #cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .dock{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:10px 12px 12px;background:linear-gradient(0deg,rgba(6,16,22,.95),rgba(6,16,22,.4) 80%,transparent);pointer-events:none}
  .dock>*{pointer-events:auto}
  .oddsbar{height:18px;border-radius:7px;overflow:hidden;display:flex;background:#0a1c23;border:1px solid var(--line);margin-bottom:5px}
  .oseg{height:100%;transition:width .4s}
  .oddstop{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:7px}
  .oddstop .nappv{font-family:'IBM Plex Mono';font-weight:600;color:var(--cyan)} .oddstop .leg{color:var(--muted);font-size:10px}
  .setupbtns{display:flex;gap:8px}
  .upl{flex:1;border:1px solid var(--line);background:rgba(18,48,58,.85);color:var(--ink);border-radius:12px;padding:12px;font-weight:600;font-size:14px;cursor:pointer}
  .cast{flex:1.4;border:none;border-radius:12px;padding:13px;font-family:'Fraunces';font-weight:800;font-size:18px;background:linear-gradient(180deg,var(--copper-bright),var(--copper));color:#26190a;cursor:pointer;box-shadow:0 8px 20px -8px rgba(214,161,92,.6)}
  .cast:active{transform:translateY(1px)} .cast.hidden,.upl.hidden{display:none}
  .panel{position:absolute;left:0;right:0;bottom:0;z-index:9;transform:translateY(110%);transition:transform .3s;background:linear-gradient(0deg,var(--panel),var(--panel-2));border-top:1px solid var(--cyan);border-radius:18px 18px 0 0;padding:16px 16px 14px}
  .panel.on{transform:translateY(0)}
  .panel h4{margin:0 0 7px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px}
  .chip{background:#0d2129;border:1px solid var(--line);color:var(--ink);border-radius:30px;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:.12s}
  .chip[aria-pressed="true"]{background:var(--cyan);color:#04222a;border-color:var(--cyan);font-weight:600}
  .chip.locked{opacity:.4;cursor:not-allowed}
  .panel .done{width:100%;border:none;border-radius:12px;padding:13px;background:var(--copper);color:#26190a;font-weight:700;font-size:15px;cursor:pointer;margin-top:2px}

  .hud{position:absolute;top:10px;left:12px;right:12px;z-index:6;display:none;flex-direction:column;gap:8px}
  .hud.on{display:flex}
  .g .gl{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;text-shadow:0 1px 2px #000}
  .track{height:10px;border-radius:20px;background:rgba(6,16,22,.75);border:1px solid var(--line);overflow:hidden;position:relative}
  .tfl{position:absolute;left:0;top:0;bottom:0;width:0;transition:width .06s linear}
  .tens .tfl{background:linear-gradient(90deg,var(--reed),var(--gold) 70%,var(--danger))}
  .tens .red{position:absolute;right:0;top:0;bottom:0;width:16%;background:repeating-linear-gradient(45deg,rgba(223,111,93,.45) 0 5px,transparent 5px 10px)}
  .stam .tfl{background:linear-gradient(90deg,#7a93a8,#a9c2cf)}
  .runwarn{align-self:center;background:rgba(223,111,93,.92);color:#2a0e0a;font-weight:800;font-size:12px;letter-spacing:.05em;padding:5px 14px;border-radius:30px;opacity:0;transition:.15s;text-transform:uppercase}
  .runwarn.on{opacity:1}

  .reelpad{position:absolute;right:14px;bottom:120px;width:64px;height:210px;z-index:7;display:none;background:rgba(13,33,41,.85);border:1px solid var(--line);border-radius:32px;touch-action:none;box-shadow:0 8px 18px rgba(0,0,0,.4)}
  .reelpad.on{display:block}
  .reelpad .arrows{position:absolute;left:0;right:0;top:9px;text-align:center;color:var(--cyan);font-size:13px;opacity:.7;pointer-events:none}
  .reelpad .arrows.b{top:auto;bottom:9px}
  .reelpad .lbl{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);pointer-events:none}
  .reelpad .grip{position:absolute;left:8px;right:8px;height:44px;top:83px;border-radius:24px;background:linear-gradient(180deg,var(--copper-bright),var(--copper));box-shadow:0 3px 8px rgba(0,0,0,.4);pointer-events:none}
  .leftacts{position:absolute;left:14px;bottom:120px;z-index:7;display:flex;flex-direction:column;gap:10px}
  .la{border:none;border-radius:16px;padding:15px 20px;font-family:'Fraunces';font-weight:800;font-size:16px;cursor:pointer;display:none;min-width:112px}
  .la.on{display:block} .la:active{transform:translateY(1px)}
  .la.lift{background:linear-gradient(180deg,#bcd0e8,#7f93b6);color:#10202e}
  .la.strike{background:linear-gradient(180deg,#8be8c6,var(--cyan));color:#04222a;animation:pulse .55s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,192,212,.5)}100%{box-shadow:0 0 0 22px rgba(95,192,212,0)}}

  .shopwrap{padding-top:4px}
  .stabs{display:flex;gap:7px;margin-bottom:10px}
  .stab{flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:10px;padding:9px;font-weight:600;font-size:13px;cursor:pointer}
  .stab[aria-selected="true"]{background:var(--panel);color:var(--ink);border-color:var(--cyan)}
  .hero{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);height:230px;background:radial-gradient(120% 100% at 50% 18%,#1c4150,#0c1f27)}
  #shop3d{width:100%;height:100%;display:block;position:relative;z-index:1;touch-action:none}
  .hero .wbg{position:absolute;inset:0;z-index:0;opacity:0;transition:opacity .4s;background:linear-gradient(180deg,#c2a079 0%,#6a6f8e 42%,#34556b 42.1%,#0f2030 100%)}
  .hero.water .wbg{opacity:1} .hero.water{background:#0f2030}
  .vtog{position:absolute;top:10px;right:10px;z-index:3;display:flex;border:1px solid var(--line);border-radius:30px;overflow:hidden;background:rgba(8,20,26,.6)}
  .vtog button{border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:700;padding:6px 11px;cursor:pointer}
  .vtog button[aria-pressed="true"]{background:var(--cyan);color:#04222a}
  .heq{position:absolute;top:10px;left:10px;z-index:2;display:none;background:rgba(138,165,127,.18);border:1px solid var(--reed);color:var(--reed);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 9px;border-radius:30px}
  .heq.on{display:block}
  .sinfo{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:11px}
  .sinfo .nm{font-family:'Fraunces';font-weight:800;font-size:19px} .sinfo .ds{color:var(--muted);font-size:12px;margin:3px 0 11px}
  .statline{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .statline .lab{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);width:90px;flex:none}
  .sbar{flex:1;height:8px;background:#0b1f27;border:1px solid var(--line);border-radius:20px;overflow:hidden;position:relative}
  .sbar .f{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--cyan),var(--copper-bright));transition:width .4s}
  .sbar .cap{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--danger)}
  .sv{font-family:'IBM Plex Mono';font-size:12px;color:var(--copper-bright);width:42px;text-align:right;flex:none}
  .cnote{font-size:11px;color:var(--muted);background:#0b1f27;border:1px solid var(--line);border-radius:10px;padding:9px;line-height:1.5}.cnote b{color:var(--gold)}
  .ptag{font-size:11px;color:var(--muted);margin-top:9px}.ptag b{color:var(--cyan)}
  .scta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .sprice{font-family:'IBM Plex Mono';font-weight:600;font-size:17px}.sprice.kr{color:var(--copper-bright)}.sprice.pe{color:var(--gold)}.sprice.free{color:var(--reed)}
  .sbuy{margin-left:auto;border:none;border-radius:11px;padding:12px 20px;font-weight:700;font-size:14px;cursor:pointer}
  .sbuy.primary{background:linear-gradient(180deg,var(--copper-bright),var(--copper));color:#26190a}.sbuy.equip{background:var(--cyan);color:#04222a}
  .sbuy.equipped{background:transparent;border:1px solid var(--reed);color:var(--reed);cursor:default}.sbuy.cant{background:#1c3e4a;color:var(--muted);cursor:default}
  .shelf{display:flex;gap:9px;overflow-x:auto;padding:12px 0 4px;scrollbar-width:none}.shelf::-webkit-scrollbar{display:none}
  .sitem{flex:none;width:92px;cursor:pointer;border:1px solid var(--line);border-radius:13px;background:var(--panel);padding:8px;position:relative}
  .sitem[aria-selected="true"]{border-color:var(--cyan);background:var(--panel-2)}
  .sthumb{height:58px;border-radius:9px;margin-bottom:7px;background:radial-gradient(120% 100% at 50% 20%,#1c4150,#0c1f27);background-size:contain,cover;background-position:center;background-repeat:no-repeat}
  .sitem .nm2{font-size:11px;font-weight:600;line-height:1.2}.sitem .pr2{font-family:'IBM Plex Mono';font-size:10px;color:var(--muted);margin-top:3px}
  .sitem .ow{position:absolute;top:5px;right:5px;width:15px;height:15px;border-radius:50%;background:var(--reed);color:#0b1f27;font-size:10px;font-weight:800;display:none;place-items:center}
  .sitem.owned .ow{display:grid}

  .lcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px}.lcard.locked{opacity:.45}
  .ltop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .ltop .ln{font-family:'Fraunces';font-weight:600;font-size:17px}.ltop .lc{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted)}
  .lcl{display:flex;gap:5px;margin-bottom:8px}
  .clc{flex:1;text-align:center;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:5px;border-radius:7px;border:1px solid var(--line);color:var(--muted)}
  .clc.got{background:#0d2129;color:var(--ink);border-color:var(--reed)}
  .lrec{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;font-family:'IBM Plex Mono';font-size:11px}
  .lrec .l2{color:var(--muted);font-size:8px;letter-spacing:.05em;text-transform:uppercase}.lrec .v2{font-size:13px;font-weight:600;margin-top:2px}
  .lrec .pb .v2{color:var(--copper-bright)}.lrec .spel .v2{color:var(--cyan)}.lrec .verk .v2{color:var(--gold)}

  .modal{position:absolute;inset:0;z-index:20;display:none;place-items:center;padding:22px;background:rgba(4,12,16,.78)}
  .modal.on{display:grid}
  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:22px;width:100%;max-width:340px;text-align:center;box-shadow:0 30px 60px -20px #000}
  .card h2{font-family:'Fraunces';font-weight:800;margin:2px 0;font-size:24px}.card .sub{color:var(--muted);font-size:12px;margin:0}
  .wt{font-family:'IBM Plex Mono';font-weight:600;font-size:30px;color:var(--copper-bright);margin:7px 0 2px}
  .tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:6px}
  .rw{background:#0d2129;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:12px 0;font-size:12px;text-align:left}
  .rw .rl{display:flex;justify-content:space-between;padding:2px 0}.rw .rl .b{color:var(--gold);font-weight:600}
  .mbtns{display:flex;gap:9px}
  .mb{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:11px;padding:12px;font-weight:600;font-size:14px;cursor:pointer}.mb.primary{background:var(--copper);color:#26190a;border-color:var(--copper)}
  .toast{position:absolute;top:96px;left:50%;transform:translateX(-50%) translateY(-12px);opacity:0;z-index:30;background:rgba(18,48,58,.96);border:1px solid var(--cyan);border-radius:30px;padding:9px 16px;font-size:13px;font-weight:600;transition:.3s;pointer-events:none;white-space:nowrap;max-width:92%;text-align:center;text-shadow:0 1px 2px #000}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .fhint{position:absolute;left:0;right:0;bottom:128px;z-index:6;text-align:center;font-size:12px;color:var(--ink);text-shadow:0 1px 4px #000;pointer-events:none}
  @media (prefers-reduced-motion:reduce){.la.strike{animation:none}}
</style>

<div class="app" id="app">
  <div class="topbar">
    <div class="lvl"><div class="lvlb" id="lvlb">1</div></div>
    <div><div class="xpbar"><div class="xpf" id="xpf"></div></div><div class="xpt" id="xpt">0 / 20 XP</div></div>
    <div class="cur"><div class="kr" id="kr">0 kr</div><div class="pe" id="pe">◈ 0</div></div>
  </div>
  <div class="tabbar" role="tablist">
    <button class="tab" role="tab" aria-selected="true" data-s="fiska">Fiska</button>
    <button class="tab" role="tab" aria-selected="false" data-s="shop">Shop</button>
    <button class="tab" role="tab" aria-selected="false" data-s="logg">Logg</button>
  </div>
  <div class="screens">
    <section class="screen on" id="s-fiska">
      <canvas id="cv"></canvas>
      <div class="hud" id="hud">
        <div class="g tens"><div class="gl"><span>Linspänning</span><span id="tp"></span></div><div class="track"><div class="red"></div><div class="tfl" id="tf"></div></div></div>
        <div class="g stam"><div class="gl"><span>Fiskens ork</span><span id="sp"></span></div><div class="track"><div class="tfl" id="sf"></div></div></div>
        <div class="runwarn" id="rw">Fisken rusar — ge lina!</div>
      </div>
      <div class="reelpad" id="reelpad"><div class="arrows">▲</div><div class="lbl">Reva</div><div class="arrows b">▼</div><div class="grip" id="grip"></div></div>
      <div class="leftacts"><button class="la lift" id="liftBtn">Lyft</button><button class="la strike" id="strikeBtn">Slå an!</button></div>
      <div class="fhint" id="fhint"></div>
      <div class="dock" id="dock">
        <div class="oddstop"><span class="leg" id="legtxt"></span><span class="nappv">Napp <b id="nappv">0%</b></span></div>
        <div class="oddsbar" id="obar"></div>
        <div class="setupbtns"><button class="upl" id="uplBtn">Upplägg</button><button class="cast" id="castBtn">Kasta ut</button></div>
      </div>
      <div class="panel" id="panel">
        <h4>Plats</h4><div class="chips" id="spots"></div>
        <h4>Metod</h4><div class="chips" id="methods"></div>
        <h4>Bete</h4><div class="chips" id="baits"></div>
        <h4>Tid på dygnet</h4><div class="chips" id="times"></div>
        <button class="done" id="doneBtn">Klar</button>
      </div>
    </section>
    <section class="screen scroll" id="s-shop">
      <div class="shopwrap">
        <div class="stabs"><button class="stab" aria-selected="true" data-c="rods">Spön</button><button class="stab" aria-selected="false" data-c="baits">Bete</button><button class="stab" aria-selected="false" data-c="skins">Skins</button></div>
        <div class="hero" id="hero"><div class="wbg"></div><canvas id="shop3d"></canvas><div class="heq" id="heq">✓ Utrustad</div>
          <div class="vtog" id="vtog"><button data-v="studio" aria-pressed="true">Studio</button><button data-v="water" aria-pressed="false">Vid vattnet</button></div></div>
        <div class="sinfo" id="sinfo"></div>
        <div class="shelf" id="shelf"></div>
      </div>
    </section>
    <section class="screen scroll" id="s-logg"><div id="loglist"></div>
      <p style="font-size:11px;color:var(--muted);text-align:center;line-height:1.6">Tre lager rekord: ditt personliga, spelets sjörekord (titel + pärlor) och det verkliga rekordet (trofé + pärlor).</p>
    </section>
  </div>
  <div class="modal" id="modal"><div class="card" id="mcard"></div></div>
  <div class="toast" id="toast"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', () => {
/* Hjälpfunktion — hämtar DOM-element via id (motsvarar HTML-strukturen). */
const getEl = id => document.getElementById(id);

/* =============================================================================
   KONFIGURATION
   Balansvärden, XP-kurva, haptik och gränser. Justera här för speltempo.
   ============================================================================= */

const HAPTICS_SUPPORTED = ('vibrate' in navigator) && typeof navigator.vibrate === 'function'
  && !/iPad|iPhone|iPod/.test(navigator.userAgent);

const BITE_CEILING = 0.48;        /* TAK — max nappsannolikhet per kast */
const ODDS_SATURATION = 85;       /* K — högre = glesare napp vid samma upplägg */
const PREDATOR_LEVEL_BONUS = 0.4; /* GOLV — rovfisk får extra vikt per level */
const GEAR_CAP = 25;              /* Max rod-bonus i procent */

/* ############################################################################
   PLATSHÅLLARE — SPÖ & BETE (kalibreras senare, ändra fritt här)
   ############################################################################ */

/* SPÖN — level då spöt SYNS och går att köpa i shoppen. */
const ROD_UNLOCK_LEVELS = { start: 1, bettre_met: 2, spinn: 3, vertikal: 15, trolling: 15 };
/* SPÖN — pris i kronor (startspöt ingår gratis i startkitet). */
const ROD_PRICES        = { start: 0, bettre_met: 150, spinn: 400, vertikal: 1200, trolling: 1600 };
/* SPÖN — egen maxkastlängd, normaliserad 0..1 (startspöt kortast, båt-spöna längst). */
const ROD_CAST_MAX      = { start: 0.55, bettre_met: 0.70, spinn: 0.85, vertikal: 1.00, trolling: 1.00 };

/* BETE — mjukt tak för hur mycket bete får påverka fångsten (aldrig avgörande). */
const BAIT_BIAS_CAP = 0.15;        /* ±15 % max effekt på artvikt */
/* BETE — pris i kronor (metodens startbete är gratis). */
const BAIT_PRICES = { mask: 0, maggot: 40, majs: 60, jigg: 0, spinnare: 120, wobbler: 200, vertikaljigg: 0, pirk: 160, trollingwobbler: 0 };
/* BETE — rå artbias per bete. Klampas mot BAIT_BIAS_CAP i fångstmodellen,
   så värden utanför [1-cap, 1+cap] kapas automatiskt. */
const BAIT_SPECIES_BIAS = {

}

   Nappchans, artval, storleksdragning, kvalitet, kast, fight och scenuppdatering.
   ============================================================================= */

/** Råvikt för en art givet nuvarande upplägg (metod × tid × plats × täthet). */
function computeRawWeight(speciesId) {
  const sp = SPECIES[speciesId];
  const methodMult = METHODS[gameState.method].speciesMult[speciesId];
  const timeMult = TIMES[gameState.time].speciesMult[speciesId];
  const spotMult = SPOTS[gameState.spot].speciesMult[speciesId];
  /* Bete = mjuk extra multiplikator (takad i getBaitMultiplier). */
  let weight = sp.density * methodMult * timeMult * spotMult * getBaitMultiplier(speciesId);
  if (sp.isPredator) weight += gameState.level * PREDATOR_LEVEL_BONUS;
  return weight;
}

/** Jämför nuvarande upplägg mot bästa möjliga — styr storleksklass, inte nappfrekvens. */
function computeSetupQuality(speciesId) {
  const current = METHODS[gameState.method].speciesMult[speciesId]
    * TIMES[gameState.time].speciesMult[speciesId]
    * SPOTS[gameState.spot].speciesMult[speciesId];
  let best = 0;
  for (const methodId in METHODS) {
    if (!isMethodAvailable(methodId)) continue;
    for (const timeId in TIMES) {
      for (const spotId in SPOTS) {
        if (gameState.level < SPOTS[spotId].unlockLevel) continue;
        best = Math.max(best,
          METHODS[methodId].speciesMult[speciesId]
          * TIMES[timeId].speciesMult[speciesId]
          * SPOTS[spotId].speciesMult[speciesId]);
      }
    }
  }
  return best > 0 ? Math.min(1, current / best) : 0;
}

/** Beräknar nappchans och artfördelning för aktuellt upplägg. */
function computeBiteOdds() {
  const available = getAvailableSpecies();
  const rawWeights = available.map(id => ({ id, weight: computeRawWeight(id) }));
  const sum = rawWeights.reduce((acc, o) => acc + o.weight, 0);
  let biteChance = BITE_CEILING * sum / (sum + ODDS_SATURATION);
  biteChance = Math.min(BITE_CEILING, biteChance * (1 + 0.01 * gameState.level) * getGearMultiplier());
  return { rawWeights, sum, biteChance };
}

/** Hur långt spelaren kommit mot artens fulla storleksspann (0–1). */
function computeSizeReach(speciesId) {
  const sp = SPECIES[speciesId];
  const span = sp.growthLevels || 25;
  return Math.max(0, Math.min(1, (gameState.level - sp.unlockLevel) / span));
}

/** Slumpar art och vikt utifrån odds och kvalitet. */
function pickSpeciesAndSize() {
  const { rawWeights, sum } = computeBiteOdds();
  let roll = Math.random() * sum;
  let pickId = rawWeights[0].id;
  for (const entry of rawWeights) {
    roll -= entry.weight;
    if (roll <= 0) { pickId = entry.id; break; }
  }
  const sp = SPECIES[pickId];
  const quality = computeSetupQuality(pickId);
  const sizeReach = computeSizeReach(pickId);
  /* Level öppnar fönstret (sizeReach), upplägget trycker uppåt (quality). */
  let storWeight = (0.05 + 0.20 * quality) * sizeReach * sizeReach;
  let braWeight = (0.20 + 0.15 * quality) * sizeReach;
  if (sizeReach < 0.5) storWeight = 0;
  if (sizeReach < 0.15) braWeight = 0;
  const litenWeight = Math.max(0, 1 - storWeight - braWeight);
  const sizeRoll = Math.random();
  const sizeClass = sizeRoll < storWeight ? 'stor' : sizeRoll < storWeight + braWeight ? 'bra' : 'liten';
  let [lo, hi] = sp.weightClasses[sizeClass];
  if (sizeClass !== 'liten') hi = lo + (hi - lo) * (0.4 + 0.6 * sizeReach);
  else lo = lo + (hi - lo) * 0.4 * sizeReach;
  const weight = +randomRange(lo, Math.max(lo, hi)).toFixed(2);
  return {
    speciesId: pickId,
    species: sp,
    weight,
    sizeClass,
    strength: Math.max(0.12, Math.min(1, weight / 8)),
    near: 0,
    x: lure.x,
    y: lure.y,
  };
}

function startFight() {

function endFight() {
  getEl('hud').classList.remove('on');

  getEl('rw').classList.remove('on');

function tickFight(now) {
  if (sceneState.mode !== 'fight' || !fightState) return;
  const dt = Math.min(0.05, (now - fightState.last) / 1000);
  fightState.last = now;
  const input = consumeReelInput(dt);
  const st = hookedFish.strength;
  const haptic = HAPTIC_PROFILES[hookedFish.speciesId];
  fightState.pulseTimer -= dt;
  if (fightState.pulseTimer <= 0) {
    triggerHaptic(haptic.pulse, haptic.sh * (fightState.running ? 0.9 : 0.45));
    fightState.pulseTimer = fightState.running ? haptic.iv * 0.6 : haptic.iv;
  }
  if (fightState.running) {
    fightState.runDuration -= dt;
    if (fightState.runDuration <= 0) {
      fightState.running = false;
      fightState.runTimer = randomRange(1, 2.2);
      getEl('rw').classList.remove('on');
    }
  } else {
    fightState.runTimer -= dt;
    if (fightState.runTimer <= 0 && fightState.stamina > fightState.max * 0.18) {
      fightState.running = true;
      fightState.runDuration = randomRange(0.8, 0.9 + st * 1.4);
      getEl('rw').classList.add('on');
      triggerHaptic(haptic.pulse, haptic.sh * 1.2);
    }
  }
  const pull = (0.15 + st * 0.5) * (fightState.running ? 2.3 : 1);
  const ease = getLevelFactors().ease;
  if (input > 0.04) {
    fightState.tension += (pull * 0.9 + input * 0.4) * dt * ease;
    fightState.stamina -= (0.6 + input * 0.5) * dt;
  } else {
    fightState.tension -= 1 * dt;
    if (fightState.running) {
      fightState.tension += pull * 0.32 * dt * ease;
      fightState.stamina -= 0.4 * dt;
    }
  }
  fightState.tension = Math.max(0, fightState.tension);
  fightState.stamina = Math.max(0, fightState.stamina);
  rodBend = 0.25 + fightState.tension * 0.85;
  hookedFish.near = 1 - fightState.stamina / fightState.max;
  getEl('tf').style.width = Math.min(100, fightState.tension * 100) + '%';
  getEl('sf').style.width = (fightState.stamina / fightState.max * 100) + '%';
  getEl('tp').textContent = Math.round(fightState.tension * 100) + '%';
  getEl('sp').textContent = Math.round(fightState.stamina / fightState.max * 100) + '%';
  if (fightState.tension >= 1) return onLineSnap();
  if (fightState.stamina <= 0) return onFishSurfaced();
}

function onLineSnap() {
  sceneState.mode = 'result';
  screenShake = 14;
  triggerHaptic([200, 90, 200], 14);
  spawnSplash(hookedFish.x, hookedFish.y, 20);
  endFight();
  setTimeout(() => showCatchResultModal(false), 420);
}

function onFishSurfaced() {
  sceneState.mode = 'surface';
  showReelPad(false);
  getEl('rw').classList.remove('on');
  hookedFish.lift = 0;
  hookedFish.thrash = 1;
  spawnSplash(hookedFish.x, waterLineY() + 18, 22);
  setTimeout(() => {
    getEl('hud').classList.remove('on');
    processLandingRewards();
  }, 900);
}

function onJigLift() { lure.phase = 'lift'; lure.pt = 0; }

/** Återställer fiskeläge till "redo att kasta". */
function resetToReady() {
  sceneState.mode = 'ready';
  rodBend = 0;
  hookedFish = null;
  fightState = null;
  lure.startX = null;
  lure.startY = null;
  lure.prog = 0;
  castCharge = null;
  getEl('hud').classList.remove('on');
  showReelPad(false);
  showLiftButton(false);
  showStrikeButton(false);
  getEl('dock').style.opacity = 1;
  const mechanic = getCurrentMechanic();
  if (mechanic === 'passive') {
    getEl('castBtn').classList.remove('hidden');
    getEl('castBtn').textContent = 'Kasta ut';
    getEl('uplBtn').classList.remove('hidden');
    setHint('');
  } else {
    getEl('castBtn').classList.add('hidden');
    getEl('uplBtn').classList.remove('hidden');
    setHint('Håll på vattnet för att ladda kastet — släpp i toppen.');
  }
}

function castMete() {
  storeBiteChanceForCast();
  /* Spöets castMax styr hur långt ut (uppåt) betet landar. */
  const reach = getRodCastMax();
  const target = { x: canvasW * (0.3 + Math.random() * 0.35), y: waterLineY() + (95 - reach * 55) + Math.random() * 40 };
  sceneState.mode = 'cast';
  castAnim = { t: 0, from: getRodTip(), to: target, dur: 0.6, isMete: true };
  getEl('castBtn').classList.add('hidden');
  getEl('uplBtn').classList.add('hidden');
  getEl('dock').style.opacity = 0.2;
}

function releasePowerCast() {
  const power = castCharge.power;
  const aimX = castCharge.x;
  castCharge = null;
  if (power < 0.12) { resetToReady(); return; }
  storeBiteChanceForCast();
  /* Spelarens skicklighet × spöets egen maxkastlängd. */
  const effective = power * getLevelFactors().castMax * getRodCastMax();
  const targetY = waterLineY() + 95 - effective * 70;
  const targetX = Math.max(canvasW * 0.14, Math.min(canvasW * 0.82, aimX + (1 - power) * randomRange(-55, 55)));
  sceneState.mode = 'cast';
  castAnim = { t: 0, from: getRodTip(), to: { x: targetX, y: targetY }, dur: 0.55 };
  if (power > 0.82) showToast('Fint kast!');
  setHint('');
  getEl('dock').style.opacity = 0.2;
}

/** Normaliserar vev-input från touch/drag till 0–1.3 hastighet. */
function consumeReelInput(dt) {
  const speed = reelAccum / Math.max(dt, 0.001);
  reelAccum = 0;
  return Math.max(0, Math.min(1.3, speed / 650));
}

function getRodTip() { return { x: canvasW * 0.60 - rodBend * 22, y: canvasH * 0.50 + rodBend * 46 }; }

function spawnSplash(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = randomRange(-Math.PI * 0.85, -Math.PI * 0.15);
    const speed = randomRange(40, 150);
    splashParts.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1 });
  }
}

function getLurePosition(now) {
  const tip = getRodTip();
  if (sceneState.mode === 'spin') {
    return {
      x: lure.startX + (tip.x - lure.startX) * lure.prog,
      y: lure.startY + (tip.y - lure.startY) * lure.prog + Math.sin(now / 120) * 2,
    };
  }
  if (sceneState.mode === 'jig') {
    const bx = lure.startX + (tip.x - lure.startX) * lure.prog;
    const by = lure.startY + (tip.y - lure.startY) * lure.prog;
    return { x: bx, y: by - (lure.height || 0) * 34 };
  }
  return { x: lure.x, y: lure.y };
}

/** Uppdaterar fiskelogik varje frame (kast, väntan, fight, partiklar). */
function updateFishingScene(dt, now) {
  const waiting = sceneState.mode === 'mete_wait' || sceneState.mode === 'spin' || sceneState.mode === 'jig';
  if (waiting) {
    if (sceneState._nibbleAt == null) sceneState._nibbleAt = now + 1400 + Math.random() * 2800;
    else if (now >= sceneState._nibbleAt) {
      triggerFakeNibble(now);
      sceneState._nibbleAt = now + 1800 + Math.random() * 3800;
    }
  } else {
    sceneState._nibbleAt = null;
  }
  if (sceneState.mode === 'charging' && castCharge) {
    castCharge.t += dt;
    const phase = castCharge.t % 1.0;
    castCharge.power = phase < 0.5 ? phase * 2 : (1 - phase) * 2;
    rodBend = -(0.3 + 0.25 * castCharge.power);
  }
  if (sceneState.mode === 'cast') {
    castAnim.t += dt;
    const p = Math.min(1, castAnim.t / castAnim.dur);
    const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
    lure.x = castAnim.from.x + (castAnim.to.x - castAnim.from.x) * ease;
    lure.y = castAnim.from.y + (castAnim.to.y - castAnim.from.y) * ease - Math.sin(p * Math.PI) * (canvasH * 0.22);
    rodBend = Math.sin(Math.min(1, castAnim.t / 0.16) * Math.PI) * 0.55;
    if (p >= 1) {
      rodBend = 0;
      spawnSplash(lure.x, lure.y, 8);
      ripples.push({ x: lure.x, y: lure.y, r: 2, max: 44, life: 1 });
      lure.startX = lure.x;
      lure.startY = lure.y;
      lure.prog = 0;
      if (castAnim.isMete) {
        sceneState.mode = 'mete_wait';
        sceneState._wait = 1 + Math.random() * 2.2;
      } else if (getCurrentMechanic() === 'retrieve') {
        sceneState.mode = 'spin';
        showReelPad(true);
        setHint('Dra upp/ner (höger) för att reva in — nappar inte varje kast.');
      } else {
        sceneState.mode = 'jig';
        lure.phase = 'rest';
        lure.pt = 0;
        lure.height = 0;
        showLiftButton(true);
        showReelPad(true);
        setHint('Lyft (vänster) → låt sjunka → reva (höger). Hugg på vevstoppet.');
      }
    }
  }
  if (sceneState.mode === 'mete_wait') {
    sceneState._wait -= dt;
    lure.bob += dt * 2.2;
    if (Math.random() < dt * 0.5) ripples.push({ x: lure.x + randomRange(-8, 8), y: lure.y, r: 1, max: 18, life: 1 });
    if (sceneState._wait <= 0) {
      if (Math.random() < sceneState._bite) triggerBite();
      else onNoBite();
    }
  }
  if (sceneState.mode === 'spin') {
    const input = consumeReelInput(dt);
    lure.prog = Math.min(1, lure.prog + input * 0.16 * dt * 1.3);
    if (input > 0.08 && lure.prog < 0.96) {
      const biteProb = dt * sceneState._bite * 1.2 * getLevelFactors().contact * (0.6 + 0.4 * input);
      if (Math.random() < biteProb) triggerBite();
    }
    if (lure.prog >= 1 && sceneState.mode === 'spin') {
      showToast('Inget napp — kasta igen.');
      resetToReady();
    }
  }
  if (sceneState.mode === 'jig') {
    if (lure.phase === 'lift') {
      lure.pt += dt;
      lure.height = Math.min(1, lure.pt / 0.34);
      if (lure.pt >= 0.34) { lure.phase = 'drop'; lure.pt = 0; }
    } else if (lure.phase === 'drop') {
      lure.pt += dt;
      lure.height = Math.max(0, 1 - lure.pt / 0.95);
      const biteProb = dt * sceneState._bite * 0.3 * getLevelFactors().contact * (0.5 + 0.5 * (1 - lure.height));
      if (Math.random() < biteProb) triggerBite();
      if (lure.pt >= 0.95) { lure.phase = 'rest'; lure.pt = 0; lure.height = 0; }
    } else {
      lure.pt += dt;
    }
    const input = consumeReelInput(dt);
    if (input > 0.08) lure.prog = Math.min(1, lure.prog + input * 0.16 * dt * 0.8);
    if (lure.prog >= 1 && sceneState.mode === 'jig') {
      showToast('Inarbetat — kasta igen.');
      resetToReady();
    }
  }
  if (sceneState.mode === 'bite') {
    strikeTimer -= dt;
    if (strikeTimer <= 0) onMissedBite();
  }
  if (sceneState.mode === 'fight') tickFight(now);
  if (sceneState.mode === 'surface' && hookedFish) {
    if (hookedFish.lift != null && hookedFish.lift < 1) hookedFish.lift = Math.min(1, hookedFish.lift + dt * 1.2);
    hookedFish.thrash = Math.max(0, (hookedFish.thrash || 0) - dt * 0.7);
  }
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 30);
  splashParts.forEach(p => { p.vy += 420 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1.4; });
  splashParts = splashParts.filter(p => p.life > 0);
  ripples.forEach(r => { r.r += (r.max - r.r) * dt * 2.4; r.life -= dt * 0.9; });
  ripples = ripples.filter(r => r.life > 0);
}

/* =============================================================================
   EKONOMI
   Försäljning, belöningar vid landning, shop-köp och valutor (kr / pärlor).
   ============================================================================= */

/** Beräknar XP och belöningar när fisken landats — uppdaterar logg och valutor indirekt. */
function processLandingRewards() {
  const fish = hookedFish;
  const logEntry = gameState.log[fish.speciesId];
  const sp = fish.species;
  const sellValue = Math.round(sp.pricePerKg * fish.weight);
  let xpGain = Math.round(sellValue * 0.5) + 5;
  const rewardLines = [];

  if (!logEntry.seen) {
    logEntry.seen = true;
    xpGain += 15;
    gameState.kronor += 10;
    rewardLines.push(['Ny art i loggen', '+15 XP, +10 kr']);
  }
  logEntry.count++;
  const hadClass = logEntry.sizeClasses[fish.sizeClass];
  logEntry.sizeClasses[fish.sizeClass]++;
  if (!hadClass && logEntry.sizeClasses.liten && logEntry.sizeClasses.bra && logEntry.sizeClasses.stor) {
    rewardLines.push(['Alla storleksklasser!', 'Tema-spö upplåst']);
  }
  if (fish.weight > logEntry.personalBest) {
    logEntry.personalBest = fish.weight;
    xpGain += 8;
    rewardLines.push(['Nytt personligt rekord', '+8 XP']);
  }
  if (fish.weight > logEntry.lakeRecord && !logEntry.beatLakeRecord) {
    logEntry.beatLakeRecord = true;
    logEntry.lakeRecord = fish.weight;
    gameState.pearls += 2;
    rewardLines.push(['Slog spelets sjörekord', 'Titel + ◈2']);
  }
  if (fish.weight >= sp.realRecordKg && !logEntry.beatRealRecord) {
    logEntry.beatRealRecord = true;
    gameState.pearls += 10;
    rewardLines.push(['Tangerar verkliga rekordet!', 'Trofé + ◈10']);
  }
  fish.value = sellValue;
  fish.xp = xpGain;
  fish.rewards = rewardLines;
  showCatchResultModal(true);
}

/** Ger metodens gratisbete när ett spö köps (om inget bete för metoden ägs). */
function grantMethodDefaultBaits(rod) {
  rod.methods.forEach(methodId => {
    const ownsSome = BAIT_ORDER.some(id => BAITS[id].method === methodId && gameState.ownedBaits.has(id));
    if (ownsSome) return;
    const def = BAIT_ORDER.find(id => BAITS[id].method === methodId && BAITS[id].methodDefault);
    if (def) { gameState.ownedBaits.add(def); gameState.bait[methodId] = def; }
  });
}

/** Köper eller utrustar vald vara i shoppen (spön/bete med kronor, skins med pärlor). */
function handleShopAction(action) {
  if (gameState.shopCategory === 'rods') {
    const rod = getRodById(gameState.selRod);
    if (action === 'buy') {
      if (!isRodUnlocked(rod)) return;                 /* låst av level */
      if (gameState.kronor >= rod.price) {
        gameState.kronor -= rod.price;
        gameState.ownedRods.add(rod.id);
        grantMethodDefaultBaits(rod);
        showToast(rod.name + ' köpt!');
      }
    } else {
      gameState.rod = rod.id;
      syncMethodToEquippedRod();
      renderSetupChips();
      renderOddsBar();
      if (sceneState.mode === 'ready') resetToReady();
      showToast(rod.name + ' utrustad');
    }
  } else if (gameState.shopCategory === 'baits') {
    const bait = BAITS[gameState.selBait];
    if (action === 'buy') {
      if (!ownsRodForMethod(bait.method)) return;      /* kräver spö för metoden */
      const price = BAIT_PRICES[bait.id];
      if (gameState.kronor >= price) {
        gameState.kronor -= price;
        gameState.ownedBaits.add(bait.id);
        gameState.bait[bait.method] = bait.id;         /* utrusta direkt */
        showToast(bait.name + ' köpt!');
      }
    } else {
      gameState.bait[bait.method] = bait.id;
      showToast(bait.name + ' valt');
    }
    if (gameState.method === bait.method) renderOddsBar();
  } else {
    const skin = SKINS.find(s => s.id === gameState.selSkin);
    if (action === 'buy') {
      if (gameState.pearls >= skin.price) {
        gameState.pearls -= skin.price;
        gameState.ownedSkins.add(skin.id);
        showToast(skin.name + ' köpt!');
      }
    } else {
      gameState.skin = skin.id;
      showToast(skin.name + ' pålagd');
    }
  }
  updateStatusBar();
  renderShopHero();
  renderShopInfo();
  renderShelf();
}

/* =============================================================================
   PROGRESSION
   XP, levelup och meddelanden om upplåsta arter, platser och metoder.
   ============================================================================= */

function grantXp(amount) {
  gameState.xp += amount;
  while (gameState.xp >= xpRequiredForLevel(gameState.level)) {
    gameState.xp -= xpRequiredForLevel(gameState.level);
    gameState.level++;
    const speciesUnlocks = SPECIES_ORDER
      .filter(id => SPECIES[id].unlockLevel === gameState.level)
      .map(id => SPECIES[id].name);
    const extraUnlocks = [];
    /* Spön som blir köpbara i shoppen på denna level. */
    RODS.filter(r => r.unlockLevel === gameState.level).forEach(r => extraUnlocks.push(r.name + ' (shop)'));
    if (SPOTS.rev.unlockLevel === gameState.level) extraUnlocks.push('Stenrev');
    if (SPOTS.djup.unlockLevel === gameState.level) extraUnlocks.push('Djupkant');
    if (gameState.level === 15) extraUnlocks.push('Båt (köp i shop)');
    const allUnlocks = [...speciesUnlocks, ...extraUnlocks];
    setTimeout(() => showToast(
      'Nivå ' + gameState.level + '!' + (allUnlocks.length ? ' Upplåst: ' + allUnlocks.join(', ') : '')
    ), 150);
  }
}

/* =============================================================================
   FISKELOGG
   Per-art statistik, rekord och storleksklass-completion.
   ============================================================================= */

function renderCatchLog() {
  const listEl = getEl('loglist');
  listEl.innerHTML = '';
  SPECIES_ORDER.forEach(id => {
    const sp = SPECIES[id];
    const logEntry = gameState.log[id];
    const seen = logEntry.seen;
    const classChip = cls => `<div class="clc ${logEntry.sizeClasses[cls] ? 'got' : ''}">${cls}</div>`;
    listEl.insertAdjacentHTML('beforeend', `
      <div class="lcard ${seen ? '' : 'locked'}">
        <div class="ltop">
          <span class="ln" style="color:${getCssVar(sp.colorVar)}">${seen ? sp.name : '??? (nivå ' + sp.unlockLevel + ')'}</span>
          <span class="lc">${seen ? logEntry.count + ' fångade' : ''}</span>
        </div>
        ${seen ? `
          <div class="lcl">${classChip('liten')}${classChip('bra')}${classChip('stor')}</div>
          <div class="lrec">
            <div class="pb"><div class="l2">Ditt rekord</div><div class="v2">${logEntry.personalBest ? formatWeight(logEntry.personalBest) : '—'}</div></div>
            <div class="spel"><div class="l2">Sjörekord</div><div class="v2">${formatWeight(logEntry.lakeRecord)}</div></div>
            <div class="verk"><div class="l2">Verkligt</div><div class="v2">${formatWeight(sp.realRecordKg)}</div></div>
          </div>` : ''}
      </div>`);
  });
}

/* =============================================================================
   UI
   All rendering och skärmuppdatering: HUD, canvas, shop, modal, toast.
   ============================================================================= */

function updateStatusBar() {
  getEl('lvlb').textContent = gameState.level;
  getEl('kr').textContent = Math.round(gameState.kronor).toLocaleString('sv-SE') + ' kr';
  getEl('pe').textContent = '◈ ' + gameState.pearls;
  const needed = xpRequiredForLevel(gameState.level);
  getEl('xpf').style.width = Math.min(100, gameState.xp / needed * 100) + '%';
  getEl('xpt').textContent = gameState.xp + ' / ' + needed + ' XP';
}

function makeChipHtml(label, active, unlocked) {
  return `<button class="chip ${unlocked ? '' : 'locked'}" aria-pressed="${active}" ${unlocked ? '' : 'aria-disabled="true"'}">${label}</button>`;
}

/** Renderar valchips för plats, metod och tid i uppläggspanelen. */
function renderSetupChips() {
  let html = '';
  for (const id in SPOTS) {
    html += `<span data-g="spot" data-k="${id}">${makeChipHtml(SPOTS[id].name, gameState.spot === id, gameState.level >= SPOTS[id].unlockLevel)}</span>`;
  }
  getEl('spots').innerHTML = html;
  html = '';
  for (const id in METHODS) {
    html += `<span data-g="method" data-k="${id}">${makeChipHtml(METHODS[id].name, gameState.method === id, isMethodAvailable(id))}</span>`;
  }
  getEl('methods').innerHTML = html;
  /* Bete för aktuell metod — upplåst = ägt (köps i shoppen). */
  html = '';
  BAIT_ORDER.filter(id => BAITS[id].method === gameState.method).forEach(id => {
    html += `<span data-g="bait" data-k="${id}">${makeChipHtml(BAITS[id].name, gameState.bait[gameState.method] === id, gameState.ownedBaits.has(id))}</span>`;
  });
  getEl('baits').innerHTML = html || '<span style="font-size:12px;color:var(--muted)">Inget bete</span>';
  html = '';
  for (const id in TIMES) {
    html += `<span data-g="time" data-k="${id}">${makeChipHtml(TIMES[id].name, gameState.time === id, true)}</span>`;
  }
  getEl('times').innerHTML = html;
  bindSetupChipHandlers();
}

function renderOddsBar() {
  const { rawWeights, sum, biteChance } = computeBiteOdds();
  getEl('nappv').textContent = Math.round(biteChance * 100) + '%';
  const bar = getEl('obar');
  bar.innerHTML = '';
  rawWeights.slice().sort((a, b) => b.weight - a.weight).forEach(entry => {
    const pct = sum > 0 ? entry.weight / sum * 100 : 0;
    bar.insertAdjacentHTML('beforeend',
      `<div class="oseg" style="width:${pct}%;background:${getCssVar(SPECIES[entry.id].colorVar)}"></div>`);
  });
  const baitId = getActiveBaitId();
  const baitName = baitId ? ' · ' + BAITS[baitId].name : '';
  getEl('legtxt').textContent = SPOTS[gameState.spot].name + ' · ' + METHODS[gameState.method].name + baitName + ' · ' + TIMES[gameState.time].name;
}

function showReelPad(visible) { getEl('reelpad').classList.toggle('on', visible); }
function showLiftButton(visible) { getEl('liftBtn').classList.toggle('on', visible); }
function showStrikeButton(visible) { getEl('strikeBtn').classList.toggle('on', visible); }
function setHint(text) { getEl('fhint').textContent = text; }

function showToast(message) {
  const el = getEl('toast');
  el.textContent = message;
  el.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('on'), 2400);
}

/** Visar modal efter landning eller linbrott. */
function showCatchResultModal(landed) {
  const modal = getEl('modal');
  const card = getEl('mcard');
  if (!landed) {
    card.innerHTML = `
      <p class="sub">Fighten</p>
      <h2 style="color:var(--danger)">Linan gick av</h2>
      <p style="font-size:13px;color:var(--muted);margin:8px 0 14px">En ${hookedFish.species.name.toLowerCase()} på ~${formatWeight(hookedFish.weight)} blev för stark. Ge mer lina när den rusar.</p>
      <div class="mbtns"><button class="mb primary" id="ag">Fortsätt</button></div>`;
  } else {
    const fish = hookedFish;
    const isBig = fish.weight >= 4;
    const rewardHtml = fish.rewards.map(r =>
      `<div class="rl"><span>${r[0]}</span><span class="b">${r[1]}</span></div>`
    ).join('') || `<div class="rl"><span>Fångst loggad</span><span class="b">+${fish.xp} XP</span></div>`;
    card.innerHTML = `
      <p class="sub">Landad · ${METHODS[gameState.method].name}</p>
      <h2 style="color:${getCssVar(fish.species.colorVar)}">${fish.species.name}</h2>
      <div class="wt">${formatWeight(fish.weight)}</div>
      <span class="tag" style="background:${isBig ? 'var(--gold)22' : 'var(--cyan)22'};color:${isBig ? 'var(--gold)' : 'var(--cyan)'};border:1px solid ${isBig ? 'var(--gold)' : 'var(--cyan)'}">${isBig ? 'Storfångst' : 'Fin fisk'}</span>
      <div class="rw">${rewardHtml}
        <div class="rl" style="border-top:1px solid var(--line);margin-top:4px;padding-top:6px"><span>Försäljning</span><span class="b" style="color:var(--copper-bright)">${fish.value} kr</span></div>
      </div>
      <div class="mbtns">
        <button class="mb primary" id="keep">Behåll · ${fish.value} kr</button>
        <button class="mb" id="rel">Släpp · +XP</button>
      </div>`;
  }
  modal.classList.add('on');
  const closeModal = msg => {
    modal.classList.remove('on');
    hookedFish = null;
    resetToReady();
    updateStatusBar();
    renderSetupChips();
    renderOddsBar();
    renderCatchLog();
    renderShelf();
    renderShopHero();
    if (msg) showToast(msg);
  };
  if (!landed) {
    getEl('ag').onclick = () => closeModal();
  } else {
    getEl('keep').onclick = () => {
      gameState.kronor += hookedFish.value;
      grantXp(hookedFish.xp);
      closeModal('+' + hookedFish.value + ' kr · +' + hookedFish.xp + ' XP');
    };
    getEl('rel').onclick = () => {
      grantXp(hookedFish.xp + 8);
      closeModal('Släppt · +' + (hookedFish.xp + 8) + ' XP');
    };
  }
}

function switchTab(screenId) {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.setAttribute('aria-selected', tab.dataset.s === screenId);
  });
  document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('on'));
  getEl('s-' + screenId).classList.add('on');
  if (screenId === 'fiska') resizeCanvas();
  if (screenId === 'shop') { resizeShop3d(); renderShopHero(); }
  if (screenId === 'logg') renderCatchLog();
}

/* --- Canvas 2D: scen --- */

function waterLineY() { return canvasH * 0.42; }

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvasW = rect.width || innerWidth;
  canvasH = rect.height || innerHeight;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildStaticScenery();
}

function buildStaticScenery() {
  const h = waterLineY();
  shoreLine = [];
  let x = 0, seed = 7;
  while (x <= canvasW) {
    seed = (seed * 9301 + 49297) % 233280;
    const hh = 14 + (seed / 233280) * 30;
    shoreLine.push([x, h - hh]);
    x += canvasW / 22;
  }
  clouds = [];
  for (let i = 0; i < 3; i++) clouds.push({ x: canvasW * (0.2 + i * 0.3), y: h * (0.3 + 0.12 * i), s: 46 + i * 20 });
  reeds = [];
  const addReeds = (baseX, count, dir) => {
    for (let i = 0; i < count; i++) reeds.push({ x: baseX + i * 13 * dir, h: 54 + Math.random() * 66, ph: Math.random() * 6 });
  };
  addReeds(18, 6, 1);
  addReeds(canvasW - 18, 5, -1);
}

let lastFrameTime = performance.now();

function gameFrame(now) {
  const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
  lastFrameTime = now;
  sceneState.t += dt;
  updateFishingScene(dt, now);
  if (getEl('s-fiska').classList.contains('on')) drawFishingScene(now);
  requestAnimationFrame(gameFrame);
}

function drawFishingScene(now) {
  const timeData = TIMES[gameState.time];
  const h = waterLineY();
  ctx.save();
  if (screenShake > 0) ctx.translate(randomRange(-screenShake, screenShake), randomRange(-screenShake, screenShake));
  let skyGrad = ctx.createLinearGradient(0, 0, 0, h);
  skyGrad.addColorStop(0, timeData.sky[0]);
  skyGrad.addColorStop(1, timeData.sky[1]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(-20, -20, canvasW + 40, h + 20);
  const gx = canvasW * 0.68, gy = h * 0.42;
  ctx.save();
  ctx.globalAlpha = 0.55;
  const sun = ctx.createRadialGradient(gx, gy, 3, gx, gy, 100);
  sun.addColorStop(0, gameState.time === 'natt' ? 'rgba(235,242,255,.95)' : 'rgba(255,238,205,.98)');
  sun.addColorStop(1, 'rgba(255,238,205,0)');
  ctx.fillStyle = sun;
  ctx.beginPath();
  ctx.arc(gx, gy, 100, 0, 7);
  ctx.fill();
  ctx.restore();
  if (gameState.time !== 'natt') {
    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#fff';
    clouds.forEach(c => {
      ctx.beginPath();
      ctx.ellipse(c.x + Math.sin(now / 4000 + c.x) * 10, c.y, c.s, c.s * 0.4, 0, 0, 7);
      ctx.ellipse(c.x + c.s * 0.6, c.y + 4, c.s * 0.6, c.s * 0.3, 0, 0, 7);
      ctx.fill();
    });
    ctx.restore();
  }
  ctx.fillStyle = timeData.shore;
  ctx.beginPath();
  ctx.moveTo(0, h);
  shoreLine.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.lineTo(canvasW, h);
  ctx.closePath();
  ctx.fill();
  let waterGrad = ctx.createLinearGradient(0, h, 0, canvasH);
  waterGrad.addColorStop(0, timeData.water[0]);
  waterGrad.addColorStop(1, timeData.water[1]);
  ctx.fillStyle = waterGrad;
  ctx.fillRect(-20, h, canvasW + 40, canvasH - h + 20);
  ctx.save();
  ctx.globalAlpha = timeData.glitter * 0.5;
  ctx.fillStyle = gameState.time === 'natt' ? '#cfe0ff' : '#ffeccb';
  for (let i = 0; i < 24; i++) {
    const yy = h + i * ((canvasH - h) / 24);
    const ww = 8 + Math.sin(now / 200 + i) * 7;
    ctx.fillRect(gx - ww / 2 + Math.sin(now / 300 + i * 2) * 6, yy, ww, 2);
  }
  ctx.restore();
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.strokeStyle = '#dff1f5';
  ctx.lineWidth = 1.4;
  for (let i = 0; i < 8; i++) {
    const yy = h + 16 + i * ((canvasH - h) / 9);
    ctx.beginPath();
    for (let x = 0; x <= canvasW; x += 16) {
      const o = Math.sin(x * 0.03 + now / 600 + i) * 2.4;
      x === 0 ? ctx.moveTo(x, yy + o) : ctx.lineTo(x, yy + o);
    }
    ctx.stroke();
  }
  ctx.restore();
  ctx.save();
  ctx.strokeStyle = 'rgba(223,239,244,.5)';
  ripples.forEach(r => {
    ctx.globalAlpha = r.life * 0.5;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.r, r.r * 0.4, 0, 0, 7);
    ctx.stroke();
  });
  ctx.restore();
  drawLineAndCatch(now);
  ctx.save();
  ctx.lineCap = 'round';
  reeds.forEach(r => {
    const sway = Math.sin(now / 900 + r.ph) * 8;
    ctx.strokeStyle = timeData.shore;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(r.x, canvasH + 4);
    ctx.quadraticCurveTo(r.x + sway * 0.5, canvasH - r.h * 0.6, r.x + sway, canvasH - r.h);
    ctx.stroke();
  });
  ctx.restore();
  ctx.fillStyle = 'rgba(8,16,12,.9)';
  ctx.beginPath();
  ctx.moveTo(canvasW, canvasH);
  ctx.lineTo(canvasW, canvasH * 0.66);
  ctx.quadraticCurveTo(canvasW * 0.82, canvasH * 0.74, canvasW * 0.7, canvasH);
  ctx.closePath();
  ctx.fill();
  drawRod();
  if (sceneState.mode === 'charging' && castCharge) {
    const pr = castCharge.power;
    const eff = pr * getLevelFactors().castMax * getRodCastMax();
    const ty = waterLineY() + 95 - eff * 70;
    const tx = Math.max(canvasW * 0.14, Math.min(canvasW * 0.82, castCharge.x));
    const tip = getRodTip();
    ctx.save();
    ctx.strokeStyle = 'rgba(95,192,212,.6)';
    ctx.setLineDash([4, 5]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.quadraticCurveTo((tip.x + tx) / 2, Math.min(tip.y, ty) - 60 * pr, tx, ty);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(95,192,212,.85)';
    ctx.beginPath();
    ctx.arc(tx, ty, 5, 0, 7);
    ctx.fill();
    const mx = 18, my = canvasH - 190, mh = 150;
    ctx.fillStyle = 'rgba(6,16,22,.7)';
    ctx.fillRect(mx, my, 13, mh);
    ctx.fillStyle = 'rgba(242,205,98,.4)';
    ctx.fillRect(mx, my, 13, mh * 0.18);
    ctx.fillStyle = pr > 0.82 ? '#f2cd62' : '#5fc0d4';
    ctx.fillRect(mx - 3, my + mh * (1 - pr) - 2, 19, 4);
    ctx.restore();
  }
  ctx.save();
  ctx.fillStyle = gameState.time === 'natt' ? '#cfe0ff' : '#eaf6fb';
  splashParts.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.4, 0, 7);
    ctx.fill();
  });
  ctx.restore();
  ctx.restore();
}

function drawRod() {
  const tip = getRodTip();
  const baseX = canvasW - 6, baseY = canvasH + 4;
  const rod = getRodById(gameState.rod);
  const skin = SKINS.find(s => s.id === gameState.skin);
  const color = skin.col != null ? hexToCss(skin.col) : hexToCss(rod.blank);
  ctx.save();
  ctx.lineCap = 'round';
  ctx.strokeStyle = color;
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(baseX, baseY);
  ctx.quadraticCurveTo((baseX + tip.x) / 2 + rodBend * 16, (baseY + tip.y) / 2 + 10, tip.x, tip.y);
  ctx.stroke();
  ctx.strokeStyle = '#0f161c';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(baseX, baseY);
  ctx.lineTo(baseX - 10, baseY - 34);
  ctx.stroke();
  ctx.restore();
}

function drawLineAndCatch(now) {
  const tip = getRodTip();
  let px, py, showLure = true;
  if (sceneState.mode === 'cast') { px = lure.x; py = lure.y; }
  else if (sceneState.mode === 'charging' || sceneState.mode === 'ready') return;
  else if (sceneState.mode === 'mete_wait') { px = lure.x; py = lure.y + Math.sin(lure.bob) * 3; }
  else if (sceneState.mode === 'spin') { const lp = getLurePosition(now); px = lp.x; py = lp.y; }
  else if (sceneState.mode === 'jig') { const lp = getLurePosition(now); px = lp.x; py = lp.y; }
  else if (sceneState.mode === 'bite') { px = lure.x; py = lure.y + Math.sin(now / 60) * 5; }
  else if (sceneState.mode === 'fight' && hookedFish) {
    const surfaceY = waterLineY() + 30, deepY = waterLineY() + 105;
    py = deepY - (deepY - surfaceY) * hookedFish.near + Math.sin(now / 170) * 12 * (1 - hookedFish.near * 0.5);
    px = lure.x + Math.sin(now / 220) * 46 * (1 - hookedFish.near * 0.55) * (fightState && fightState.running ? 1.5 : 1);
    hookedFish.x = px; hookedFish.y = py;
    showLure = false;
  } else if (sceneState.mode === 'surface' && hookedFish) {
    const surfaceY = waterLineY() + 16;
    py = surfaceY - (hookedFish.lift || 0) * 130 + Math.sin(now / 60) * 6 * (hookedFish.thrash || 0);
    px = lure.x;
    hookedFish.x = px; hookedFish.y = py;
    showLure = false;
  } else return;
  ctx.save();
  ctx.strokeStyle = 'rgba(236,246,250,.7)';
  ctx.lineWidth = 1.3;
  const sag = sceneState.mode === 'fight' ? 6 : 12;
  ctx.beginPath();
  ctx.moveTo(tip.x, tip.y);
  ctx.quadraticCurveTo((tip.x + px) / 2, (tip.y + py) / 2 + sag, px, py);
  ctx.stroke();
  ctx.restore();
  if ((sceneState.mode === 'fight' || sceneState.mode === 'surface') && hookedFish) {
    if (hookedFish.near > 0.55 || sceneState.mode === 'surface') {
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = 'rgba(223,239,244,.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(px, waterLineY() + 18, 30, 8, 0, 0, 7);
      ctx.stroke();
      ctx.restore();
    }
    drawFishSprite(px, py, hookedFish, now);
  } else if (showLure) {
    drawLureSprite(px, py);
  }
}

function drawLureSprite(x, y) {
  ctx.save();
  ctx.translate(x, y);
  const mechanic = getCurrentMechanic();
  if (mechanic === 'retrieve') {
    ctx.fillStyle = '#e85d4d';
    ctx.beginPath(); ctx.ellipse(0, 0, 5, 9, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, -3, 1.6, 0, 7); ctx.fill();
  } else if (mechanic === 'jig') {
    ctx.fillStyle = '#5fc0d4';
    ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(5, 7); ctx.lineTo(-5, 7); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle = '#b06a4a';
    ctx.beginPath(); ctx.ellipse(0, 0, 4, 8, 0, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function drawFishSprite(x, y, fish, now) {
  const scale = 22 * (0.5 + Math.min(1.4, fish.weight / 6)) * (0.7 + 0.3 * (fish.near || 0.4));
  const len = scale, ht = scale * 0.4;
  const wob = Math.sin(now / (160 - (fightState && fightState.running ? 60 : 0))) * 0.3;
  const clarity = 0.35 + 0.65 * (fish.near || 0.4);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(wob * 0.35 + (sceneState.mode === 'surface' ? Math.sin(now / 50) * 0.15 * (fish.thrash || 0) : 0));
  ctx.globalAlpha = clarity;
  ctx.fillStyle = getCssVar(fish.species.colorVar);
  ctx.beginPath(); ctx.ellipse(0, 0, len, ht, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-len * 0.9, 0); ctx.lineTo(-len * 1.45, -ht); ctx.lineTo(-len * 1.45, ht); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-len * 0.1, -ht); ctx.lineTo(len * 0.25, -ht * 1.7); ctx.lineTo(len * 0.4, -ht); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.16)';
  ctx.beginPath(); ctx.ellipse(2, ht * 0.35, len * 0.7, ht * 0.32, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#0d1c25';
  ctx.beginPath(); ctx.arc(len * 0.62, -ht * 0.18, Math.max(1.6, scale * 0.06), 0, 7); ctx.fill();
  ctx.restore();
}

/* --- Three.js shop --- */

function disposeGroup(group) {
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
  });
}

function initShop() {
  if (!window.THREE) return;
  const shopCanvas = getEl('shop3d');
  shopRenderer = new THREE.WebGLRenderer({ canvas: shopCanvas, antialias: true, alpha: true });
  shopRenderer.setPixelRatio(Math.min(2, devicePixelRatio));
  shopScene = new THREE.Scene();
  shopCamera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
  shopCamera.position.set(0, 0, 9);
  shopScene.add(new THREE.AmbientLight(0x88aab5, 0.7));
  const keyLight = new THREE.DirectionalLight(0xfff2dd, 1.15);
  keyLight.position.set(4, 6, 7);
  shopScene.add(keyLight);
  const rimLight = new THREE.DirectionalLight(0x5fc0d4, 0.5);
  rimLight.position.set(-6, -2, 3);
  shopScene.add(rimLight);
  shopPivot = new THREE.Group();
  shopScene.add(shopPivot);
  shopPivot.rotation.set(0.18, -0.5, 0.35);
  thumbRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
  thumbRenderer.setPixelRatio(2);
  thumbRenderer.setSize(120, 76);
  thumbScene = new THREE.Scene();
  thumbCamera = new THREE.PerspectiveCamera(42, 120 / 76, 0.1, 50);
  thumbCamera.position.set(0, 0, 9.5);
  thumbScene.add(new THREE.AmbientLight(0x88aab5, 0.85));
  const thumbKey = new THREE.DirectionalLight(0xfff2dd, 1.15);
  thumbKey.position.set(3, 5, 6);
  thumbScene.add(thumbKey);
  thumbPivot = new THREE.Group();
  thumbScene.add(thumbPivot);
  thumbPivot.rotation.set(0.15, -0.6, 0.4);
  new ResizeObserver(resizeShop3d).observe(shopCanvas);
}

function resizeShop3d() {
  if (!shopRenderer) return;
  const c = getEl('shop3d');
  const rect = c.getBoundingClientRect();
  if (!rect.width) return;
  shopRenderer.setSize(rect.width, rect.height, false);
  shopCamera.aspect = rect.width / rect.height;
  shopCamera.updateProjectionMatrix();
}

function buildShopRod(rod, skin) {
  if (shopRodGroup) { shopPivot.remove(shopRodGroup); disposeGroup(shopRodGroup); }
  shopRodGroup = new THREE.Group();
  const blankColor = skin.col != null ? skin.col : rod.blank;
  const metalness = skin.metal != null ? skin.metal : rod.metal;
  const roughness = skin.rough != null ? skin.rough : rod.rough;
  const blankMat = new THREE.MeshStandardMaterial({ color: blankColor, metalness, roughness });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x16191d, metalness: 0.4, roughness: 0.5 });
  const corkMat = new THREE.MeshStandardMaterial({ color: 0xc8a26a, metalness: 0.05, roughness: 0.9 });
  const silverMat = new THREE.MeshStandardMaterial({ color: 0xcfd6da, metalness: 0.85, roughness: 0.25 });
  const L = rod.len, tipR = rod.taper * 0.35, buttR = rod.taper;
  const blank = new THREE.Mesh(new THREE.CylinderGeometry(tipR, buttR, L, 18), blankMat);
  blank.position.y = L / 2;
  shopRodGroup.add(blank);
  const grip = new THREE.Mesh(new THREE.CylinderGeometry(buttR * 1.7, buttR * 1.7, 0.9, 16), corkMat);
  grip.position.y = 0.45;
  shopRodGroup.add(grip);
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(buttR * 1.5, buttR * 1.2, 0.18, 14), darkMat);
  cap.position.y = 0.02;
  shopRodGroup.add(cap);
  const seat = new THREE.Mesh(new THREE.CylinderGeometry(buttR * 1.35, buttR * 1.35, 0.45, 14), darkMat);
  seat.position.y = 1.02;
  shopRodGroup.add(seat);
  const reel = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.34, 18),
    new THREE.MeshStandardMaterial({ color: 0x2b3138, metalness: 0.6, roughness: 0.35 }));
  body.rotation.x = Math.PI / 2;
  body.position.set(0, -0.5, 0.12);
  reel.add(body);
  const spool = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.06, 10, 20), silverMat);
  spool.position.set(0, -0.5, 0.3);
  reel.add(spool);
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8), darkMat);
  stem.position.set(0, -0.22, 0);
  reel.add(stem);
  reel.position.y = 1.02;
  shopRodGroup.add(reel);
  for (let i = 0; i < rod.guides; i++) {
    const f = (i + 1) / (rod.guides + 0.5);
    const y = 1.5 + f * (L - 1.7);
    const r = THREE.MathUtils.lerp(0.13, 0.05, f);
    const ring = new THREE.Mesh(new THREE.TorusGeometry(r, 0.016, 8, 14), silverMat);
    ring.position.set(0, y, r + 0.02);
    shopRodGroup.add(ring);
  }
  const tipMesh = new THREE.Mesh(new THREE.SphereGeometry(tipR * 1.3, 8, 8), silverMat);
  tipMesh.position.y = L + 0.05;
  shopRodGroup.add(tipMesh);
  shopRodGroup.position.y = -L / 2;
  shopPivot.add(shopRodGroup);
}

function buildSimpleRod(group, rod, skin) {
  const blankColor = skin.col != null ? skin.col : rod.blank;
  const mat = new THREE.MeshStandardMaterial({
    color: blankColor,
    metalness: skin.metal != null ? skin.metal : rod.metal,
    roughness: skin.rough != null ? skin.rough : rod.rough,
  });
  const L = rod.len;
  const blank = new THREE.Mesh(new THREE.CylinderGeometry(rod.taper * 0.35, rod.taper, L, 12), mat);
  blank.position.y = L / 2;
  group.add(blank);
  const grip = new THREE.Mesh(new THREE.CylinderGeometry(rod.taper * 1.7, rod.taper * 1.7, 0.9, 10),
    new THREE.MeshStandardMaterial({ color: 0xc8a26a, roughness: 0.9 }));
  grip.position.y = 0.45;
  group.add(grip);
  group.children.forEach(c => { c.position.y -= L / 2; });
}

function getRodThumbnailUrl(rod, skin) {
  if (!thumbRenderer) return '';
  while (thumbPivot.children.length) {
    const c = thumbPivot.children.pop();
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
  }
  buildSimpleRod(thumbPivot, rod, skin);
  thumbRenderer.render(thumbScene, thumbCamera);
  return thumbRenderer.domElement.toDataURL('image/png');
}

function setShopView(viewId) {
  gameState.view = viewId;
  document.querySelectorAll('#vtog button').forEach(btn => {
    btn.setAttribute('aria-pressed', btn.dataset.v === viewId);
  });
  if (viewId === 'water') {
    shopPivot.rotation.set(0, -0.35, -1.05);
    shopPivot.position.set(0.7, -0.4, 0);
    shopCamera.position.z = 8;
  } else {
    shopPivot.rotation.set(0.18, -0.5, 0.35);
    shopPivot.position.set(0, 0, 0);
    shopCamera.position.z = 9;
  }
  getEl('hero').classList.toggle('water', viewId === 'water');
}

function getShopSelection() {
  /* Bete har ingen egen 3D-modell — visa utrustat spö i hero. */
  if (gameState.shopCategory === 'baits') {
    return { rod: getRodById(gameState.rod), skin: SKINS.find(s => s.id === gameState.skin) };
  }
  return {
    rod: getRodById(gameState.shopCategory === 'rods' ? gameState.selRod : gameState.rod),
    skin: SKINS.find(s => s.id === (gameState.shopCategory === 'skins' ? gameState.selSkin : gameState.skin)),
  };
}

function renderShopHero() {
  if (!shopRenderer) return;
  const { rod, skin } = getShopSelection();
  buildShopRod(rod, skin);
  const isEquipped = gameState.shopCategory === 'rods'
    ? gameState.selRod === gameState.rod
    : gameState.shopCategory === 'baits'
      ? gameState.bait[BAITS[gameState.selBait].method] === gameState.selBait
      : gameState.selSkin === gameState.skin;
  getEl('heq').classList.toggle('on', isEquipped);
  getEl('hero').classList.toggle('water', gameState.view === 'water');
}

function buildShopCtaHtml(price, currencyKind, owned, equipped) {
  const priceHtml = price === 0
    ? '<span class="sprice free">Gratis</span>'
    : `<span class="sprice ${currencyKind}">${currencyKind === 'kr' ? price.toLocaleString('sv-SE') + ' kr' : '◈ ' + price}</span>`;
  let btn;
  if (equipped) btn = '<button class="sbuy equipped" disabled>✓ Utrustad</button>';
  else if (owned) btn = '<button class="sbuy equip" id="sb" data-a="equip">Utrusta</button>';
  else {
    const canAfford = currencyKind === 'kr' ? gameState.kronor >= price : gameState.pearls >= price;
    btn = canAfford
      ? '<button class="sbuy primary" id="sb" data-a="buy">Köp</button>'
      : `<button class="sbuy cant" disabled>${currencyKind === 'kr' ? 'För lite kr' : 'För få ◈'}</button>`;
  }
  return `<div class="scta">${priceHtml}${btn}</div>`;
}

/* Låst CTA — visas för spön som ännu inte nått sin level. */
function buildLockedCtaHtml(level) {
  return `<div class="scta"><span class="sprice">Låst</span><button class="sbuy cant" disabled>Låses upp på level ${level}</button></div>`;
}

/* CTA för bete (kronor). Utrusta-knappen heter "Välj". */
function buildBaitCtaHtml(bait, owned, equipped) {
  const price = BAIT_PRICES[bait.id];
  const priceHtml = price === 0
    ? '<span class="sprice free">Gratis</span>'
    : `<span class="sprice kr">${price.toLocaleString('sv-SE')} kr</span>`;
  let btn;
  if (equipped) btn = '<button class="sbuy equipped" disabled>✓ Vald</button>';
  else if (owned) btn = '<button class="sbuy equip" id="sb" data-a="equip">Välj</button>';
  else btn = gameState.kronor >= price
    ? '<button class="sbuy primary" id="sb" data-a="buy">Köp</button>'
    : '<button class="sbuy cant" disabled>För lite kr</button>';
  return `<div class="scta">${priceHtml}${btn}</div>`;
}

function renderShopInfo() {
  const info = getEl('sinfo');
  if (gameState.shopCategory === 'rods') {
    const rod = getRodById(gameState.selRod);
    const owned = gameState.ownedRods.has(rod.id);
    const equipped = gameState.rod === rod.id;
    const unlocked = isRodUnlocked(rod);
    const methodNames = rod.methods.map(m => METHODS[m].name).join(', ');
    const castPct = Math.round(rod.castMax * 100);
    const boatNote = rod.requiresBoat ? ' <b>Kräver båt.</b>' : '';
    info.innerHTML = `
      <div class="nm">${rod.name}</div>
      <div class="ds">${rod.description}</div>
      <div class="statline"><span class="lab">Kastlängd</span>
        <div class="sbar"><div class="f" style="width:${castPct}%"></div><div class="cap" style="left:100%"></div></div>
        <span class="sv">${castPct}%</span></div>
      <div class="ptag">Metod: <b>${methodNames}</b>.${boatNote}</div>
      ${unlocked ? buildShopCtaHtml(rod.price, 'kr', owned, equipped) : buildLockedCtaHtml(rod.unlockLevel)}`;
  } else if (gameState.shopCategory === 'baits') {
    const bait = BAITS[gameState.selBait];
    const owned = gameState.ownedBaits.has(bait.id);
    const equipped = gameState.bait[bait.method] === bait.id;
    const methodOwned = ownsRodForMethod(bait.method);
    const capPct = Math.round(BAIT_BIAS_CAP * 100);
    info.innerHTML = `
      <div class="nm">${bait.name}</div>
      <div class="ds">För ${METHODS[bait.method].name}.</div>
      <div class="cnote"><b>Mjuk bias.</b> Bete gör att vissa arter nappar lite oftare — takat vid ±${capPct}%, aldrig avgörande.</div>
      ${methodOwned ? buildBaitCtaHtml(bait, owned, equipped)
        : `<div class="scta"><span class="sprice">Låst</span><button class="sbuy cant" disabled>Kräver ${methodRodName(bait.method)}</button></div>`}`;
  } else {
    const skin = SKINS.find(s => s.id === gameState.selSkin);
    const owned = gameState.ownedSkins.has(skin.id);
    const equipped = gameState.skin === skin.id;
    info.innerHTML = `
      <div class="nm">${skin.name}</div>
      <div class="ds">${skin.description}</div>
      <div class="cnote"><b>Endast utseende.</b> Skins köps med pärlor och ger ingen fördel i fisket.</div>
      ${buildShopCtaHtml(skin.price, 'pe', owned, equipped)}`;
  }
  bindShopActionButton();
}

function bindShopActionButton() {
  const btn = getEl('sb');
  if (!btn) return;
  btn.onclick = () => handleShopAction(btn.dataset.a);
}

function renderShelf() {
  const shelf = getEl('shelf');
  shelf.innerHTML = '';
  const cat = gameState.shopCategory;

  /* Per kategori: lista, vald, ägd-koll, lås-koll, lås-etikett och prisetikett. */
  let list, selected, isOwned, isLocked, lockLabel, priceLabel;
  if (cat === 'rods') {
    list = RODS; selected = gameState.selRod;
    isOwned = it => gameState.ownedRods.has(it.id);
    isLocked = it => !isRodUnlocked(it);
    lockLabel = it => 'Lvl ' + it.unlockLevel;
    priceLabel = it => it.price === 0 ? 'Gratis' : it.price.toLocaleString('sv-SE') + ' kr';
  } else if (cat === 'baits') {
    list = BAIT_ORDER.map(id => BAITS[id]); selected = gameState.selBait;
    isOwned = it => gameState.ownedBaits.has(it.id);
    isLocked = it => !ownsRodForMethod(it.method);
    lockLabel = () => 'Kräver spö';
    priceLabel = it => BAIT_PRICES[it.id] === 0 ? 'Gratis' : BAIT_PRICES[it.id].toLocaleString('sv-SE') + ' kr';
  } else {
    list = SKINS; selected = gameState.selSkin;
    isOwned = it => gameState.ownedSkins.has(it.id);
    isLocked = () => false;
    lockLabel = () => '';
    priceLabel = it => it.price === 0 ? 'Gratis' : '◈ ' + it.price;
  }

  list.forEach(item => {
    const div = document.createElement('div');
    const locked = isLocked(item);
    div.className = 'sitem' + (isOwned(item) ? ' owned' : '');
    div.setAttribute('aria-selected', item.id === selected);
    if (locked) div.style.opacity = '0.45';   /* gråtonad tills upplåst */
    div.innerHTML = `<div class="sthumb"></div><div class="nm2">${item.name}</div><div class="pr2">${locked ? lockLabel(item) : priceLabel(item)}</div><div class="ow">✓</div>`;
    div.onclick = () => {
      if (cat === 'rods') gameState.selRod = item.id;
      else if (cat === 'baits') gameState.selBait = item.id;
      else gameState.selSkin = item.id;
      renderShopHero();
      renderShopInfo();
      renderShelf();
    };
    shelf.appendChild(div);
    /* Bete saknar 3D-modell — endast spön/skins får miniatyrbild. */
    if (cat !== 'baits') {
      const rod = cat === 'rods' ? item : getRodById(gameState.rod);
      const skin = cat === 'skins' ? item : SKINS.find(s => s.id === gameState.skin);
      const url = getRodThumbnailUrl(rod, skin);
      const thumb = div.querySelector('.sthumb');
      if (url) thumb.style.backgroundImage = `url(${url}), radial-gradient(120% 100% at 50% 20%,#1c4150,#0c1f27)`;
    }
  });
}

/* =============================================================================
   EVENTHANTERING
   Klick, touch, pointer — kopplar spelarinput till spellogik.
   ============================================================================= */

/** Binder klick på plats/metod/tid-chips i uppläggspanelen. */
function bindSetupChipHandlers() {
  document.querySelectorAll('#panel [data-g]').forEach(el => {
    el.onclick = () => {
      if (el.querySelector('.locked')) return;
      const field = el.dataset.g;
      const value = el.dataset.k;
      if (field === 'bait') {
        /* Bete lagras per metod. */
        gameState.bait[gameState.method] = value;
        renderSetupChips();
        renderOddsBar();
        return;
      }
      const changedMethod = field === 'method' && gameState[field] !== value;
      gameState[field] = value;
      if (changedMethod) equipRodForMethod(value);  /* utrusta spö som passar metoden */
      renderSetupChips();
      renderOddsBar();
      if (changedMethod && sceneState.mode === 'ready') resetToReady();
    };
  });
}

function bindTabNavigation() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.dataset.s);
  });
}

function bindSetupPanelButtons() {
  getEl('uplBtn').onclick = () => getEl('panel').classList.add('on');
  getEl('doneBtn').onclick = () => {
    getEl('panel').classList.remove('on');
    if (sceneState.mode === 'ready') resetToReady();
  };
}

function bindCastButton() {
  getEl('castBtn').onclick = () => {
    if (sceneState.mode === 'ready' && getCurrentMechanic() === 'passive') castMete();
  };
}

function bindFightButtons() {
  getEl('strikeBtn').onclick = () => { if (sceneState.mode === 'bite') onStrike(); };
  getEl('liftBtn').onclick = () => { if (sceneState.mode === 'jig' && lure.phase === 'rest') onJigLift(); };
}

function bindCanvasCastInput() {
  canvas.addEventListener('pointerdown', e => {
    if (sceneState.mode !== 'ready' || getCurrentMechanic() === 'passive') return;
    if (getEl('panel').classList.contains('on')) return;
    const rect = canvas.getBoundingClientRect();
    castCharge = { t: 0, power: 0, x: e.clientX - rect.left };
    sceneState.mode = 'charging';
    getEl('uplBtn').classList.add('hidden');
    setHint('Släpp i den gula zonen (toppen) för längsta kast.');
  });
  canvas.addEventListener('pointermove', e => {
    if (sceneState.mode !== 'charging' || !castCharge) return;
    const rect = canvas.getBoundingClientRect();
    castCharge.x = e.clientX - rect.left;
  });
  canvas.addEventListener('pointerup', () => {
    if (sceneState.mode === 'charging') releasePowerCast();
  });
}

function bindReelPadInput() {
  const reelPad = getEl('reelpad');
  const grip = getEl('grip');
  let dragging = false, lastY = 0;

  function onDown(e) {
    e.preventDefault();
    dragging = true;
    lastY = (e.touches ? e.touches[0] : e).clientY;
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const y = (e.touches ? e.touches[0] : e).clientY;
    const dy = y - lastY;
    reelAccum += Math.abs(dy);
    lastY = y;
    const rect = reelPad.getBoundingClientRect();
    grip.style.top = Math.max(8, Math.min(rect.height - 52, y - rect.top - 22)) + 'px';
  }
  function onUp() { dragging = false; }

  reelPad.addEventListener('pointerdown', onDown);
  addEventListener('pointermove', onMove);
  addEventListener('pointerup', onUp);
  reelPad.addEventListener('touchstart', onDown, { passive: false });
  addEventListener('touchmove', onMove, { passive: false });
  addEventListener('touchend', onUp);
}

function bindShopInput() {
  if (!shopRenderer) return;
  const shopCanvas = getEl('shop3d');
  let dragging = false, lastX = 0, lastY = 0, idleFrames = 0;

  shopCanvas.addEventListener('pointerdown', e => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  });
  addEventListener('pointermove', e => {
    if (!dragging || !shopPivot) return;
    shopPivot.rotation.y += (e.clientX - lastX) * 0.01;
    shopPivot.rotation.x = Math.max(-0.7, Math.min(0.7, shopPivot.rotation.x + (e.clientY - lastY) * 0.008));
    lastX = e.clientX;
    lastY = e.clientY;
  });
  addEventListener('pointerup', () => { dragging = false; idleFrames = 0; });

  document.querySelectorAll('#vtog button').forEach(btn => {
    btn.onclick = () => setShopView(btn.dataset.v);
  });
  document.querySelectorAll('.stab').forEach(tab => {
    tab.onclick = () => {
      gameState.shopCategory = tab.dataset.c;
      document.querySelectorAll('.stab').forEach(x => x.setAttribute('aria-selected', x === tab));
      renderShopHero();
      renderShopInfo();
      renderShelf();
    };
  });

  (function shopRenderLoop() {
    requestAnimationFrame(shopRenderLoop);
    if (shopRenderer) {
      if (!dragging && gameState.view === 'studio') {
        idleFrames++;
        if (idleFrames > 90) shopPivot.rotation.y += 0.004;
      }
      shopRenderer.render(shopScene, shopCamera);
    }
  })();
}

function bindResizeObservers() {
  new ResizeObserver(resizeCanvas).observe(canvas);
}

/** Startar spelet — binder events och renderar initialt läge. */
function initGame() {
  bindTabNavigation();
  bindSetupPanelButtons();
  bindCastButton();
  bindFightButtons();
  bindCanvasCastInput();
  bindReelPadInput();
  bindResizeObservers();
  initShop();
  bindShopInput();
  renderSetupChips();
  resizeCanvas();
  renderOddsBar();
  updateStatusBar();
  renderCatchLog();
  resetToReady();
  renderShopHero();
  renderShopInfo();
  renderShelf();
  requestAnimationFrame(gameFrame);
}

initGame();


});
</script>
